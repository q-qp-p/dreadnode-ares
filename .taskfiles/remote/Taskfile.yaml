---
# Remote development tasks - sync code to running K8s pods
version: "3"

vars:
  INFO: '\033[0;34m[INFO]\033[0m'
  SUCCESS: '\033[0;32m[SUCCESS]\033[0m'
  ERROR: '\033[0;31m[ERROR]\033[0m'
  WARN: '\033[1;33m[WARN]\033[0m'
  ORCH_CONTAINER: '{{.ORCH_CONTAINER | default "orchestrator"}}'
  WORKER_CONTAINER: '{{.WORKER_CONTAINER | default ""}}'
  PARALLELISM: '{{.PARALLELISM | default "10"}}'
  PVC_PATH: '/ares'
  VERIFY_PVC_DIFF: '{{.VERIFY_PVC_DIFF | default "true"}}'
  # Team selector: red, blue, or all (default: all)
  TEAM: '{{.TEAM | default "all"}}'
  # Pod labels by team
  RED_COMPONENT_LABEL: 'ares.dreadnode.io/component=red-team'
  BLUE_COMPONENT_LABEL: 'ares.dreadnode.io/component=blue-team'
  RED_ORCH_LABEL: 'app.kubernetes.io/name=ares-orchestrator'
  BLUE_ORCH_LABEL: 'app.kubernetes.io/name=ares-blue-orchestrator'

tasks:
  # ============================================================================
  # HOT RELOAD: Watch and Sync
  # ============================================================================
  hot:
    desc: "Watch for code changes and auto-sync to pods"
    silent: true
    vars:
      WATCH_DIR: '{{.WATCH_DIR | default "src/ares"}}'
    preconditions:
      - sh: command -v fswatch >/dev/null 2>&1
        msg: "fswatch is required. Install with: brew install fswatch"
      - sh: command -v kubectl >/dev/null 2>&1
        msg: "kubectl is required"
    cmds:
      - |
        echo -e "{{.INFO}} Validating environment..."

        # Check kubectl connectivity
        if ! kubectl cluster-info &> /dev/null; then
          echo -e "{{.ERROR}} Cannot connect to Kubernetes cluster"
          exit 1
        fi

        # Check if ares pods exist
        POD_COUNT=$(kubectl get pods -n {{.K8S_NAMESPACE}} \
          -l ares.dreadnode.io/component=red-team \
          --field-selector=status.phase=Running \
          -o json 2>/dev/null | jq '.items | length')

        if [ "$POD_COUNT" = "0" ] || [ -z "$POD_COUNT" ]; then
          echo -e "{{.ERROR}} No running ares pods found in namespace {{.K8S_NAMESPACE}}"
          echo -e "{{.INFO}} Check with: kubectl get pods -n {{.K8S_NAMESPACE}}"
          exit 1
        fi

        echo -e "{{.SUCCESS}} Found $POD_COUNT running agent pod(s)"

      - |
        echo ""
        echo -e "{{.INFO}} Starting hot-reload development"
        echo -e "{{.INFO}} Namespace: {{.K8S_NAMESPACE}}"
        echo -e "{{.INFO}} Watching: {{.WATCH_DIR}}/**/*.py"
        echo ""
        echo -e "{{.SUCCESS}} File sync active! Edit files and save to trigger sync."
        echo -e "{{.INFO}} Press Ctrl+C to stop"
        echo ""

        # Watch for changes and sync
        fswatch -r -e ".*" -i "\\.py$" "{{.WATCH_DIR}}" | while read -r changed_file; do
          # Extract relative path from src/ares/
          relative_path="${changed_file#*src/ares/}"

          echo -e "{{.INFO}} [$(date +%H:%M:%S)] Detected: $relative_path"

          # Get all running pods and sync to each
          PODS=$(kubectl get pods -n {{.K8S_NAMESPACE}} \
            -l ares.dreadnode.io/component=red-team \
            --field-selector=status.phase=Running \
            -o json | jq -r '.items[] | select(.metadata.labels["ares.dreadnode.io/role"] != "atomic") | .metadata.name' | tr '\n' ' ')

          # Also get orchestrator
          ORCH_POD=$(kubectl get pods -n {{.K8S_NAMESPACE}} \
            -l app.kubernetes.io/name=ares-orchestrator \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)

          # Sync to worker pods (PVC only - PYTHONPATH=/ares/src handles imports)
          if [ -n "$PODS" ]; then
            printf '%s\n' $PODS | xargs -n1 -P {{.PARALLELISM}} -I{} bash -c '
              pod="$1"
              file="$2"
              rel="$3"
              verify="{{.VERIFY_PVC_DIFF}}"
              worker_container="{{.WORKER_CONTAINER}}"
              if [ -z "$worker_container" ]; then
                worker_container=$(kubectl get pod -n {{.K8S_NAMESPACE}} "$pod" \
                  -o jsonpath="{.spec.containers[0].name}" 2>/dev/null)
              fi
              if [ -n "$worker_container" ]; then
                container_flag=(-c "$worker_container")
              else
                container_flag=()
              fi
              if kubectl cp "$file" "$pod:{{.PVC_PATH}}/src/ares/$rel" \
                  -n {{.K8S_NAMESPACE}} "${container_flag[@]}" 2>/dev/null; then
                echo -e "{{.SUCCESS}}   -> $pod"
              elif kubectl cp "$file" "$pod:{{.PVC_PATH}}/src/ares/$rel" \
                  -n {{.K8S_NAMESPACE}} 2>/dev/null; then
                echo -e "{{.SUCCESS}}   -> $pod"
              else
                echo -e "{{.WARN}}   x $pod (failed)"
              fi
              if [ "$verify" = "true" ]; then
                local_hash=$(shasum -a 256 "$file" 2>/dev/null | awk "{print \$1}")
                remote_hash=$(kubectl exec -n {{.K8S_NAMESPACE}} "${container_flag[@]}" "$pod" -- \
                  sha256sum "/ares/src/ares/$rel" 2>/dev/null | awk "{print \$1}")
                if [ -z "$remote_hash" ]; then
                  remote_hash="MISSING"
                fi
                if [ "$remote_hash" = "__ERR__" ] || [ "$local_hash" = "__ERR__" ]; then
                  echo -e "{{.WARN}}   x $pod (pvc-verify failed)"
                elif [ "$remote_hash" = "MISSING" ]; then
                  echo -e "{{.WARN}}   x $pod (pvc missing)"
                elif [ "$remote_hash" = "$local_hash" ]; then
                  echo -e "{{.SUCCESS}}   -> $pod (pvc verified)"
                else
                  echo -e "{{.WARN}}   x $pod (pvc differs)"
                fi
              fi
              exit 0
            ' _ {} "$changed_file" "$relative_path"
          fi

          # Sync to orchestrator (PVC only)
          if [ -n "$ORCH_POD" ]; then
            if kubectl cp "$changed_file" "$ORCH_POD:{{.PVC_PATH}}/src/ares/$relative_path" \
                -n {{.K8S_NAMESPACE}} -c {{.ORCH_CONTAINER}} 2>/dev/null; then
              echo -e "{{.SUCCESS}}   -> $ORCH_POD"
            else
              echo -e "{{.WARN}}   x $ORCH_POD (failed)"
            fi
            if [ "{{.VERIFY_PVC_DIFF}}" = "true" ]; then
              local_hash=$(shasum -a 256 "$changed_file" 2>/dev/null | awk "{print \$1}")
              remote_hash=$(kubectl exec -n {{.K8S_NAMESPACE}} -c {{.ORCH_CONTAINER}} "$ORCH_POD" -- \
                sha256sum "/ares/src/ares/$relative_path" 2>/dev/null | awk "{print \$1}")
              if [ -z "$remote_hash" ]; then
                remote_hash="MISSING"
              fi
              if [ "$remote_hash" = "__ERR__" ] || [ "$local_hash" = "__ERR__" ]; then
                echo -e "{{.WARN}}   x $ORCH_POD (pvc-verify failed)"
              elif [ "$remote_hash" = "MISSING" ]; then
                echo -e "{{.WARN}}   x $ORCH_POD (pvc missing)"
              elif [ "$remote_hash" = "$local_hash" ]; then
                echo -e "{{.SUCCESS}}   -> $ORCH_POD (pvc verified)"
              else
                echo -e "{{.WARN}}   x $ORCH_POD (pvc differs)"
              fi
            fi
          fi
          echo ""
        done

  # ============================================================================
  # SYNC: Copy files to pods
  # ============================================================================
  sync:
    desc: "Sync local code to pods (usage: task remote:sync [FILES=src/ares/core/worker.py] [TEAM=red|blue|all])"
    silent: true
    vars:
      FILES: '{{.FILES | default ""}}'
    cmds:
      - |
        echo -e "{{.INFO}} Syncing code to pods in {{.K8S_NAMESPACE}} (team={{.TEAM}})"

        ORCH_PODS=""
        WORKER_PODS=""

        # Get red team pods if TEAM=red or TEAM=all
        if [ "{{.TEAM}}" = "red" ] || [ "{{.TEAM}}" = "all" ]; then
          RED_ORCH=$(kubectl get pods -n {{.K8S_NAMESPACE}} \
            -l {{.RED_ORCH_LABEL}} \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -n "$RED_ORCH" ]; then
            ORCH_PODS="$ORCH_PODS $RED_ORCH"
          fi

          RED_WORKERS=$(kubectl get pods -n {{.K8S_NAMESPACE}} \
            -l {{.RED_COMPONENT_LABEL}} \
            --field-selector=status.phase=Running \
            -o json | jq -r --arg orch "$RED_ORCH" '.items[] | select(.metadata.labels["ares.dreadnode.io/role"] != "atomic") | select(.metadata.name != $orch) | .metadata.name' | tr '\n' ' ')
          WORKER_PODS="$WORKER_PODS $RED_WORKERS"
        fi

        # Get blue team pods if TEAM=blue or TEAM=all
        if [ "{{.TEAM}}" = "blue" ] || [ "{{.TEAM}}" = "all" ]; then
          BLUE_ORCH=$(kubectl get pods -n {{.K8S_NAMESPACE}} \
            -l {{.BLUE_ORCH_LABEL}} \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -n "$BLUE_ORCH" ]; then
            ORCH_PODS="$ORCH_PODS $BLUE_ORCH"
          fi

          BLUE_WORKERS=$(kubectl get pods -n {{.K8S_NAMESPACE}} \
            -l {{.BLUE_COMPONENT_LABEL}} \
            --field-selector=status.phase=Running \
            -o json | jq -r --arg orch "$BLUE_ORCH" '.items[] | select(.metadata.labels["ares.dreadnode.io/role"] != "atomic") | select(.metadata.name != $orch) | .metadata.name' | tr '\n' ' ')
          WORKER_PODS="$WORKER_PODS $BLUE_WORKERS"
        fi

        # Trim whitespace
        ORCH_PODS=$(echo "$ORCH_PODS" | xargs)
        PODS=$(echo "$WORKER_PODS" | xargs)

        if [ -z "$PODS" ] && [ -z "$ORCH_PODS" ]; then
          echo -e "{{.ERROR}} No running pods found for team={{.TEAM}}"
          exit 1
        fi

        # Determine files to sync
        if [ -n "{{.FILES}}" ]; then
          FILES_TO_SYNC="{{.FILES}}"
        else
          # Default: sync all ares source files
          FILES_TO_SYNC=$(find src/ares -name "*.py" -type f)
        fi

        for f in $FILES_TO_SYNC; do
          if [ ! -f "$f" ]; then
            echo -e "{{.WARN}} Skipping (not found): $f"
            continue
          fi

          relative_path="${f#src/ares/}"
          echo -e "{{.INFO}} $relative_path"

          # Sync to worker pods (PVC only - PYTHONPATH=/ares/src handles imports)
          if [ -n "$PODS" ]; then
            printf '%s\n' $PODS | xargs -n1 -P {{.PARALLELISM}} -I{} bash -c '
              pod="$1"
              file="$2"
              rel="$3"
              verify="{{.VERIFY_PVC_DIFF}}"
              worker_container="{{.WORKER_CONTAINER}}"
              if [ -z "$worker_container" ]; then
                worker_container=$(kubectl get pod -n {{.K8S_NAMESPACE}} "$pod" \
                  -o jsonpath="{.spec.containers[0].name}" 2>/dev/null)
              fi
              if [ -n "$worker_container" ]; then
                container_flag=(-c "$worker_container")
              else
                container_flag=()
              fi
              if kubectl cp "$file" "$pod:{{.PVC_PATH}}/src/ares/$rel" \
                  -n {{.K8S_NAMESPACE}} "${container_flag[@]}" 2>/dev/null; then
                echo -e "{{.SUCCESS}}   -> $pod"
              elif kubectl cp "$file" "$pod:{{.PVC_PATH}}/src/ares/$rel" \
                  -n {{.K8S_NAMESPACE}} 2>/dev/null; then
                echo -e "{{.SUCCESS}}   -> $pod"
              else
                echo -e "{{.WARN}}   x $pod"
              fi
              if [ "$verify" = "true" ]; then
                local_hash=$(shasum -a 256 "$file" 2>/dev/null | awk "{print \$1}")
                remote_hash=$(kubectl exec -n {{.K8S_NAMESPACE}} "${container_flag[@]}" "$pod" -- \
                  sha256sum "/ares/src/ares/$rel" 2>/dev/null | awk "{print \$1}")
                if [ -z "$remote_hash" ]; then
                  remote_hash="MISSING"
                fi
                if [ "$remote_hash" = "__ERR__" ] || [ "$local_hash" = "__ERR__" ]; then
                  echo -e "{{.WARN}}   x $pod (pvc-verify failed)"
                elif [ "$remote_hash" = "MISSING" ]; then
                  echo -e "{{.WARN}}   x $pod (pvc missing)"
                elif [ "$remote_hash" = "$local_hash" ]; then
                  echo -e "{{.SUCCESS}}   -> $pod (pvc verified)"
                else
                  echo -e "{{.WARN}}   x $pod (pvc differs)"
                fi
              fi
              exit 0
            ' _ {} "$f" "$relative_path"
          fi

          # Sync to orchestrator(s) (PVC only)
          for ORCH_POD in $ORCH_PODS; do
            if kubectl cp "$f" "$ORCH_POD:{{.PVC_PATH}}/src/ares/$relative_path" \
                -n {{.K8S_NAMESPACE}} -c {{.ORCH_CONTAINER}} 2>/dev/null; then
              echo -e "{{.SUCCESS}}   -> $ORCH_POD"
            else
              echo -e "{{.WARN}}   x $ORCH_POD"
            fi
            if [ "{{.VERIFY_PVC_DIFF}}" = "true" ]; then
              local_hash=$(shasum -a 256 "$f" 2>/dev/null | awk "{print \$1}")
              remote_hash=$(kubectl exec -n {{.K8S_NAMESPACE}} -c {{.ORCH_CONTAINER}} "$ORCH_POD" -- \
                sha256sum "/ares/src/ares/$relative_path" 2>/dev/null | awk "{print \$1}")
              if [ -z "$remote_hash" ]; then
                remote_hash="MISSING"
              fi
              if [ "$remote_hash" = "__ERR__" ] || [ "$local_hash" = "__ERR__" ]; then
                echo -e "{{.WARN}}   x $ORCH_POD (pvc-verify failed)"
              elif [ "$remote_hash" = "MISSING" ]; then
                echo -e "{{.WARN}}   x $ORCH_POD (pvc missing)"
              elif [ "$remote_hash" = "$local_hash" ]; then
                echo -e "{{.SUCCESS}}   -> $ORCH_POD (pvc verified)"
              else
                echo -e "{{.WARN}}   x $ORCH_POD (pvc differs)"
              fi
            fi
          done
        done

        echo ""
        echo -e "{{.SUCCESS}} Sync complete"

  # ============================================================================
  # SYNC:FULL: Copy full src/ares tree to pods
  # ============================================================================
  sync:full:
    desc: "Sync full src/ares tree to pods (usage: task remote:sync:full [TEAM=red|blue|all])"
    silent: true
    cmds:
      - |
        echo -e "{{.INFO}} Full sync to pods in {{.K8S_NAMESPACE}} (team={{.TEAM}})"

        ORCH_PODS=""
        WORKER_PODS=""

        # Get red team pods if TEAM=red or TEAM=all
        if [ "{{.TEAM}}" = "red" ] || [ "{{.TEAM}}" = "all" ]; then
          RED_ORCH=$(kubectl get pods -n {{.K8S_NAMESPACE}} \
            -l {{.RED_ORCH_LABEL}} \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -n "$RED_ORCH" ]; then
            ORCH_PODS="$ORCH_PODS $RED_ORCH"
          fi

          RED_WORKERS=$(kubectl get pods -n {{.K8S_NAMESPACE}} \
            -l {{.RED_COMPONENT_LABEL}} \
            --field-selector=status.phase=Running \
            -o json | jq -r --arg orch "$RED_ORCH" '.items[] | select(.metadata.labels["ares.dreadnode.io/role"] != "atomic") | select(.metadata.name != $orch) | .metadata.name' | tr '\n' ' ')
          WORKER_PODS="$WORKER_PODS $RED_WORKERS"
        fi

        # Get blue team pods if TEAM=blue or TEAM=all
        if [ "{{.TEAM}}" = "blue" ] || [ "{{.TEAM}}" = "all" ]; then
          BLUE_ORCH=$(kubectl get pods -n {{.K8S_NAMESPACE}} \
            -l {{.BLUE_ORCH_LABEL}} \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -n "$BLUE_ORCH" ]; then
            ORCH_PODS="$ORCH_PODS $BLUE_ORCH"
          fi

          BLUE_WORKERS=$(kubectl get pods -n {{.K8S_NAMESPACE}} \
            -l {{.BLUE_COMPONENT_LABEL}} \
            --field-selector=status.phase=Running \
            -o json | jq -r --arg orch "$BLUE_ORCH" '.items[] | select(.metadata.labels["ares.dreadnode.io/role"] != "atomic") | select(.metadata.name != $orch) | .metadata.name' | tr '\n' ' ')
          WORKER_PODS="$WORKER_PODS $BLUE_WORKERS"
        fi

        # Trim whitespace
        ORCH_PODS=$(echo "$ORCH_PODS" | xargs)
        PODS=$(echo "$WORKER_PODS" | xargs)

        if [ -z "$PODS" ] && [ -z "$ORCH_PODS" ]; then
          echo -e "{{.ERROR}} No running pods found for team={{.TEAM}}"
          exit 1
        fi

        # Show what we found
        POD_COUNT=$(echo $PODS | wc -w | tr -d ' ')
        ORCH_COUNT=$(echo $ORCH_PODS | wc -w | tr -d ' ')
        ORCH_MSG=""
        if [ -n "$ORCH_PODS" ]; then
          ORCH_MSG=" + $ORCH_COUNT orchestrator(s)"
        fi
        echo -e "{{.INFO}} Found $POD_COUNT worker pods${ORCH_MSG}, syncing..."

        # Sync to worker pods
        if [ "{{.VERIFY_PVC_DIFF}}" = "true" ]; then
          MANIFEST=$(mktemp /tmp/ares-sha256.XXXX)
          (cd src/ares && find . -type d -name __pycache__ -prune -o -type f ! -name "*.pyc" -print0 | sort -z | xargs -0 shasum -a 256) > "$MANIFEST"
        else
          MANIFEST=""
        fi
        if [ -n "$PODS" ]; then
          printf '%s\n' $PODS | xargs -n1 -P {{.PARALLELISM}} -I{} bash -c '
            pod="$1"
            manifest="$2"
            worker_container="{{.WORKER_CONTAINER}}"
            if [ -z "$worker_container" ]; then
              worker_container=$(kubectl get pod -n {{.K8S_NAMESPACE}} "$pod" \
                -o jsonpath="{.spec.containers[0].name}" 2>/dev/null)
            fi
            if [ -n "$worker_container" ]; then
              container_flag=(-c "$worker_container")
            else
              container_flag=()
            fi
            sync_ok="false"
            if kubectl exec -n {{.K8S_NAMESPACE}} "${container_flag[@]}" "$pod" -- \
                mkdir -p {{.PVC_PATH}}/src/ares 2>/dev/null && \
              kubectl cp src/ares/. "$pod":{{.PVC_PATH}}/src/ares \
                -n {{.K8S_NAMESPACE}} "${container_flag[@]}" 2>/dev/null; then
              sync_ok="true"
            elif kubectl cp src/ares/. "$pod":{{.PVC_PATH}}/src/ares \
                -n {{.K8S_NAMESPACE}} 2>/dev/null; then
              sync_ok="true"
            fi
            if [ "{{.VERIFY_PVC_DIFF}}" = "true" ]; then
              if [ "$sync_ok" = "true" ] && kubectl exec -n {{.K8S_NAMESPACE}} "${container_flag[@]}" "$pod" -- \
                  mkdir -p {{.PVC_PATH}}/tmp 2>/dev/null && \
                kubectl cp "$manifest" "$pod:{{.PVC_PATH}}/tmp/ares.sha256" \
                  -n {{.K8S_NAMESPACE}} "${container_flag[@]}" 2>/dev/null; then
                set +e
                verify_out=$(kubectl exec -n {{.K8S_NAMESPACE}} "${container_flag[@]}" "$pod" -- \
                  sh -c "cd {{.PVC_PATH}}/src/ares && sha256sum -c {{.PVC_PATH}}/tmp/ares.sha256" 2>&1)
                verify_rc=$?
                set -e
                if [ $verify_rc -eq 0 ]; then
                  echo -e "{{.SUCCESS}}   -> $pod (synced, pvc verified)"
                else
                  echo -e "{{.WARN}}   x $pod (synced, pvc differs)"
                  failed_lines=$(printf "%s\n" "$verify_out" | grep -E "FAILED|No such file" || true)
                  failed_count=$(printf "%s\n" "$failed_lines" | sed "/^$/d" | wc -l | tr -d " ")
                  if [ "$failed_count" -gt 0 ]; then
                    if [ "$failed_count" -gt 20 ]; then
                      echo -e "{{.INFO}}   showing first 20 of $failed_count failures"
                    fi
                    printf "%s\n" "$failed_lines" | head -n 20
                  else
                    printf "%s\n" "$verify_out" | head -n 5
                  fi
                fi
              else
                echo -e "{{.WARN}}   x $pod (sync failed)"
              fi
            else
              if [ "$sync_ok" = "true" ]; then
                echo -e "{{.SUCCESS}}   -> $pod (synced)"
              else
                echo -e "{{.WARN}}   x $pod (sync failed)"
              fi
            fi
            exit 0
          ' _ {} "$MANIFEST"
        fi

        # Sync to orchestrator(s)
        for ORCH_POD in $ORCH_PODS; do
          sync_ok="false"
          if kubectl exec -n {{.K8S_NAMESPACE}} -c {{.ORCH_CONTAINER}} "$ORCH_POD" -- \
              mkdir -p {{.PVC_PATH}}/src/ares 2>/dev/null && \
            kubectl cp src/ares/. "$ORCH_POD":{{.PVC_PATH}}/src/ares \
              -n {{.K8S_NAMESPACE}} -c {{.ORCH_CONTAINER}} 2>/dev/null; then
            sync_ok="true"
          fi
          if [ "{{.VERIFY_PVC_DIFF}}" = "true" ]; then
            if [ "$sync_ok" = "true" ] && kubectl exec -n {{.K8S_NAMESPACE}} -c {{.ORCH_CONTAINER}} "$ORCH_POD" -- \
                mkdir -p {{.PVC_PATH}}/tmp 2>/dev/null && \
              kubectl cp "$MANIFEST" "$ORCH_POD:{{.PVC_PATH}}/tmp/ares.sha256" \
                -n {{.K8S_NAMESPACE}} -c {{.ORCH_CONTAINER}} 2>/dev/null; then
              set +e
              verify_out=$(kubectl exec -n {{.K8S_NAMESPACE}} -c {{.ORCH_CONTAINER}} "$ORCH_POD" -- \
                sh -c "cd {{.PVC_PATH}}/src/ares && sha256sum -c {{.PVC_PATH}}/tmp/ares.sha256" 2>&1)
              verify_rc=$?
              set -e
              if [ $verify_rc -eq 0 ]; then
                echo -e "{{.SUCCESS}}   -> $ORCH_POD (synced, pvc verified)"
              else
                echo -e "{{.WARN}}   x $ORCH_POD (synced, pvc differs)"
                failed_lines=$(printf "%s\n" "$verify_out" | grep -E "FAILED|No such file" || true)
                failed_count=$(printf "%s\n" "$failed_lines" | sed "/^$/d" | wc -l | tr -d " ")
                if [ "$failed_count" -gt 0 ]; then
                  if [ "$failed_count" -gt 20 ]; then
                    echo -e "{{.INFO}}   showing first 20 of $failed_count failures"
                  fi
                  printf "%s\n" "$failed_lines" | head -n 20
                else
                  printf "%s\n" "$verify_out" | head -n 5
                fi
              fi
            else
              echo -e "{{.WARN}}   x $ORCH_POD (sync failed)"
            fi
          else
            if [ "$sync_ok" = "true" ]; then
              echo -e "{{.SUCCESS}}   -> $ORCH_POD (synced)"
            else
              echo -e "{{.WARN}}   x $ORCH_POD (sync failed)"
            fi
          fi
        done

        echo ""
        echo -e "{{.SUCCESS}} Full sync complete"
        if [ -n "$MANIFEST" ]; then
          rm -f "$MANIFEST"
        fi

  # ============================================================================
  # ROLLOUT: Restart pods
  # ============================================================================
  rollout:
    desc: "Restart pods to pick up code changes (usage: task remote:rollout [TEAM=red|blue|all])"
    silent: true
    cmds:
      - |
        echo -e "{{.INFO}} Restarting deployments and statefulsets in {{.K8S_NAMESPACE}} (team={{.TEAM}})..."

        # Restart red team pods if TEAM=red or TEAM=all
        if [ "{{.TEAM}}" = "red" ] || [ "{{.TEAM}}" = "all" ]; then
          echo -e "{{.INFO}} Restarting red team agents..."
          kubectl rollout restart deployment -n {{.K8S_NAMESPACE}} -l {{.RED_COMPONENT_LABEL}},ares.dreadnode.io/role!=orchestrator 2>/dev/null || true
          kubectl rollout restart statefulset -n {{.K8S_NAMESPACE}} -l {{.RED_COMPONENT_LABEL}},ares.dreadnode.io/role!=orchestrator 2>/dev/null || true
          kubectl rollout restart deployment -n {{.K8S_NAMESPACE}} -l {{.RED_ORCH_LABEL}} 2>/dev/null || true
        fi

        # Restart blue team pods if TEAM=blue or TEAM=all
        if [ "{{.TEAM}}" = "blue" ] || [ "{{.TEAM}}" = "all" ]; then
          echo -e "{{.INFO}} Restarting blue team agents..."
          kubectl rollout restart deployment -n {{.K8S_NAMESPACE}} -l {{.BLUE_COMPONENT_LABEL}},ares.dreadnode.io/role!=orchestrator 2>/dev/null || true
          kubectl rollout restart statefulset -n {{.K8S_NAMESPACE}} -l {{.BLUE_COMPONENT_LABEL}},ares.dreadnode.io/role!=orchestrator 2>/dev/null || true
          kubectl rollout restart deployment -n {{.K8S_NAMESPACE}} -l {{.BLUE_ORCH_LABEL}} 2>/dev/null || true
        fi

        echo -e "{{.SUCCESS}} Rollout initiated"
        echo -e "{{.INFO}} Checking status..."

        # Check red team status if TEAM=red or TEAM=all
        if [ "{{.TEAM}}" = "red" ] || [ "{{.TEAM}}" = "all" ]; then
          kubectl rollout status deployment -n {{.K8S_NAMESPACE}} -l {{.RED_COMPONENT_LABEL}},ares.dreadnode.io/role!=orchestrator --timeout=60s 2>/dev/null || true
          kubectl rollout status statefulset -n {{.K8S_NAMESPACE}} -l {{.RED_COMPONENT_LABEL}},ares.dreadnode.io/role!=orchestrator --timeout=60s 2>/dev/null || true
          kubectl rollout status deployment -n {{.K8S_NAMESPACE}} -l {{.RED_ORCH_LABEL}} --timeout=60s 2>/dev/null || true
        fi

        # Check blue team status if TEAM=blue or TEAM=all
        if [ "{{.TEAM}}" = "blue" ] || [ "{{.TEAM}}" = "all" ]; then
          kubectl rollout status deployment -n {{.K8S_NAMESPACE}} -l {{.BLUE_COMPONENT_LABEL}},ares.dreadnode.io/role!=orchestrator --timeout=60s 2>/dev/null || true
          kubectl rollout status statefulset -n {{.K8S_NAMESPACE}} -l {{.BLUE_COMPONENT_LABEL}},ares.dreadnode.io/role!=orchestrator --timeout=60s 2>/dev/null || true
          kubectl rollout status deployment -n {{.K8S_NAMESPACE}} -l {{.BLUE_ORCH_LABEL}} --timeout=60s 2>/dev/null || true
        fi

        echo ""
        echo -e "{{.SUCCESS}} All pods restarted"

  # ============================================================================
  # PVC: Clear dev PVCs
  # ============================================================================
  pvc:clear:
    desc: "Clear dev code from PVCs for a fresh deploy (usage: task remote:pvc:clear [CONFIRM=true] [ROLLOUT=true])"
    silent: true
    vars:
      CONFIRM: '{{.CONFIRM | default "false"}}'
      ROLLOUT: '{{.ROLLOUT | default "true"}}'
    cmds:
      - |
        set -euo pipefail

        if [ "{{.CONFIRM}}" != "true" ]; then
          echo -e "{{.WARN}} This will delete {{.PVC_PATH}}/src/ares from pods."
          echo -e "{{.WARN}} Re-run with CONFIRM=true to proceed."
          exit 1
        fi

        ORCH_POD=$(kubectl get pods -n {{.K8S_NAMESPACE}} \
          -l app.kubernetes.io/name=ares-orchestrator \
          --field-selector=status.phase=Running \
          -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)

        PODS=$(kubectl get pods -n {{.K8S_NAMESPACE}} \
          -l ares.dreadnode.io/component=red-team \
          --field-selector=status.phase=Running \
          -o json | jq -r --arg orch "$ORCH_POD" \
          '.items[] | select(.metadata.labels["ares.dreadnode.io/role"] != "atomic") | select(.metadata.name != $orch) | .metadata.name' | tr '\n' ' ')

        if [ -z "$PODS" ] && [ -z "$ORCH_POD" ]; then
          echo -e "{{.ERROR}} No running pods found"
          exit 1
        fi

        echo -e "{{.INFO}} Clearing {{.PVC_PATH}}/src/ares in pods..."

        if [ -n "$PODS" ]; then
          printf '%s\n' $PODS | xargs -n1 -P {{.PARALLELISM}} -I{} bash -c '
            pod="$1"
            worker_container="{{.WORKER_CONTAINER}}"
            if [ -z "$worker_container" ]; then
              worker_container=$(kubectl get pod -n {{.K8S_NAMESPACE}} "$pod" \
                -o jsonpath="{.spec.containers[0].name}" 2>/dev/null)
            fi
            if [ -n "$worker_container" ]; then
              container_flag=(-c "$worker_container")
            else
              container_flag=()
            fi
            if kubectl exec -n {{.K8S_NAMESPACE}} "${container_flag[@]}" "$pod" -- \
                rm -rf {{.PVC_PATH}}/src/ares 2>/dev/null && \
              kubectl exec -n {{.K8S_NAMESPACE}} "${container_flag[@]}" "$pod" -- \
                mkdir -p {{.PVC_PATH}}/src/ares 2>/dev/null; then
              echo -e "{{.SUCCESS}}   -> $pod"
            else
              echo -e "{{.WARN}}   x $pod"
            fi
            exit 0
          ' _ {}
        fi

        if [ -n "$ORCH_POD" ]; then
          if kubectl exec -n {{.K8S_NAMESPACE}} -c {{.ORCH_CONTAINER}} "$ORCH_POD" -- \
              rm -rf {{.PVC_PATH}}/src/ares 2>/dev/null && \
            kubectl exec -n {{.K8S_NAMESPACE}} -c {{.ORCH_CONTAINER}} "$ORCH_POD" -- \
              mkdir -p {{.PVC_PATH}}/src/ares 2>/dev/null; then
            echo -e "{{.SUCCESS}}   -> $ORCH_POD"
          else
            echo -e "{{.WARN}}   x $ORCH_POD"
          fi
        fi

        if [ "{{.ROLLOUT}}" = "true" ]; then
          echo -e "{{.INFO}} Restarting deployments after PVC clear..."
          kubectl rollout restart deployment -n {{.K8S_NAMESPACE}} -l ares.dreadnode.io/component=red-team 2>/dev/null || true
          kubectl rollout restart deployment -n {{.K8S_NAMESPACE}} -l app.kubernetes.io/name=ares-orchestrator 2>/dev/null || true
          echo -e "{{.SUCCESS}} Rollout initiated"
        fi

  # ============================================================================
  # STATUS: Check pod status
  # ============================================================================
  status:
    desc: "Show remote pod status and infrastructure health"
    silent: true
    cmds:
      - |
        echo ""
        echo -e "{{.INFO}} Infrastructure Status: {{.K8S_NAMESPACE}}"
        echo "========================================"

        # Check namespace
        if kubectl get namespace {{.K8S_NAMESPACE}} >/dev/null 2>&1; then
          echo -e "{{.SUCCESS}} Namespace exists"
        else
          echo -e "{{.ERROR}} Namespace not found"
        fi

        # Check Redis
        REDIS_POD=$(kubectl get pods -n {{.K8S_NAMESPACE}} -l app=redis -o name 2>/dev/null | head -1)
        if [ -n "$REDIS_POD" ]; then
          if kubectl exec -n {{.K8S_NAMESPACE}} $REDIS_POD -- redis-cli ping >/dev/null 2>&1; then
            echo -e "{{.SUCCESS}} Redis responding"
          else
            echo -e "{{.ERROR}} Redis not responding"
          fi
        else
          echo -e "{{.WARN}} No Redis pods found"
        fi

        echo ""
        echo -e "{{.INFO}} Agent Pods"
        echo "========================================"
        for role in orchestrator recon cracker acl privesc lateral coercion; do
          if [ "$role" = "orchestrator" ]; then
            POD_COUNT=$(kubectl get pods -n {{.K8S_NAMESPACE}} -l app.kubernetes.io/name=ares-orchestrator -o name 2>/dev/null | wc -l | xargs)
            STATUS=$(kubectl get pods -n {{.K8S_NAMESPACE}} -l app.kubernetes.io/name=ares-orchestrator -o jsonpath='{.items[0].status.phase}' 2>/dev/null)
          else
            POD_COUNT=$(kubectl get pods -n {{.K8S_NAMESPACE}} -l ares.dreadnode.io/role=$role -o name 2>/dev/null | wc -l | xargs)
            STATUS=$(kubectl get pods -n {{.K8S_NAMESPACE}} -l ares.dreadnode.io/role=$role -o jsonpath='{.items[0].status.phase}' 2>/dev/null)
          fi
          if [ "$POD_COUNT" -gt 0 ]; then
            echo -e "{{.SUCCESS}} $role: $POD_COUNT pod(s) - $STATUS"
          else
            echo -e "{{.WARN}} $role: No pods"
          fi
        done

        echo ""
        echo -e "{{.INFO}} All Pods"
        echo "========================================"
        kubectl get pods -n {{.K8S_NAMESPACE}} -o wide 2>/dev/null || echo -e "{{.ERROR}} Failed to get pods"

        echo ""
        echo -e "{{.INFO}} Deployments"
        echo "========================================"
        kubectl get deployments -n {{.K8S_NAMESPACE}} 2>/dev/null || echo -e "{{.ERROR}} Failed to get deployments"

  # ============================================================================
  # LOGS: Tail pod logs
  # ============================================================================
  logs:
    desc: "Tail logs from pods (usage: task remote:logs [ROLE=enum|orchestrator] [FOLLOW=true])"
    silent: true
    vars:
      ROLE: '{{.ROLE | default ""}}'
      FOLLOW: '{{.FOLLOW | default "true"}}'
      LINES: '{{.LINES | default "100"}}'
      MAX_LOG_REQUESTS: '{{.MAX_LOG_REQUESTS | default "50"}}'
    cmds:
      - |
        CONTAINER_ARGS=""
        if [ "{{.ROLE}}" = "orchestrator" ]; then
          SELECTOR="-l app.kubernetes.io/name=ares-orchestrator"
          CONTAINER_ARGS="-c {{.ORCH_CONTAINER}}"
          echo -e "{{.INFO}} Orchestrator logs:"
        elif [ -n "{{.ROLE}}" ]; then
          SELECTOR="-l ares.dreadnode.io/role={{.ROLE}}"
          if [ -n "{{.WORKER_CONTAINER}}" ]; then
            CONTAINER_ARGS="-c {{.WORKER_CONTAINER}}"
          fi
          echo -e "{{.INFO}} Logs from {{.ROLE}} agent:"
        else
          SELECTOR="-l ares.dreadnode.io/component=red-team"
          if [ -n "{{.WORKER_CONTAINER}}" ]; then
            CONTAINER_ARGS="-c {{.WORKER_CONTAINER}}"
          fi
          echo -e "{{.INFO}} Logs from all agents:"
        fi
        echo "========================================"

        if [ "{{.FOLLOW}}" = "true" ]; then
          if [ -n "$CONTAINER_ARGS" ]; then
            kubectl logs -n {{.K8S_NAMESPACE}} $SELECTOR $CONTAINER_ARGS --tail={{.LINES}} -f --prefix=true --max-log-requests={{.MAX_LOG_REQUESTS}} 2>/dev/null || \
              kubectl logs -n {{.K8S_NAMESPACE}} $SELECTOR --tail={{.LINES}} -f --prefix=true --max-log-requests={{.MAX_LOG_REQUESTS}}
          else
            kubectl logs -n {{.K8S_NAMESPACE}} $SELECTOR --tail={{.LINES}} -f --prefix=true --max-log-requests={{.MAX_LOG_REQUESTS}}
          fi
        else
          if [ -n "$CONTAINER_ARGS" ]; then
            kubectl logs -n {{.K8S_NAMESPACE}} $SELECTOR $CONTAINER_ARGS --tail={{.LINES}} --prefix=true --max-log-requests={{.MAX_LOG_REQUESTS}} 2>/dev/null || \
              kubectl logs -n {{.K8S_NAMESPACE}} $SELECTOR --tail={{.LINES}} --prefix=true --max-log-requests={{.MAX_LOG_REQUESTS}}
          else
            kubectl logs -n {{.K8S_NAMESPACE}} $SELECTOR --tail={{.LINES}} --prefix=true --max-log-requests={{.MAX_LOG_REQUESTS}}
          fi
        fi

  # ============================================================================
  # LOGS:DUMP: Write logs to file for analysis
  # ============================================================================
  logs:dump:
    desc: "Dump logs to file for analysis (usage: task remote:logs:dump [ROLE=cracker] [LINES=5000] [SINCE=10m])"
    silent: true
    vars:
      ROLE: '{{.ROLE | default ""}}'
      LINES: '{{.LINES | default "5000"}}'
      SINCE: '{{.SINCE | default ""}}'
      OUTPUT_DIR: '{{.OUTPUT_DIR | default "/tmp"}}'
      MAX_LOG_REQUESTS: '{{.MAX_LOG_REQUESTS | default "50"}}'
    cmds:
      - |
        CONTAINER_ARGS=""
        if [ "{{.ROLE}}" = "orchestrator" ]; then
          SELECTOR="-l app.kubernetes.io/name=ares-orchestrator"
          CONTAINER_ARGS="-c {{.ORCH_CONTAINER}}"
          FILENAME="ares-orchestrator.log"
        elif [ -n "{{.ROLE}}" ]; then
          SELECTOR="-l ares.dreadnode.io/role={{.ROLE}}"
          if [ -n "{{.WORKER_CONTAINER}}" ]; then
            CONTAINER_ARGS="-c {{.WORKER_CONTAINER}}"
          fi
          FILENAME="ares-{{.ROLE}}.log"
        else
          SELECTOR="-l ares.dreadnode.io/component=red-team"
          if [ -n "{{.WORKER_CONTAINER}}" ]; then
            CONTAINER_ARGS="-c {{.WORKER_CONTAINER}}"
          fi
          FILENAME="ares-all-agents.log"
        fi

        OUTPUT_FILE="{{.OUTPUT_DIR}}/$FILENAME"

        # Build time filter if specified
        TIME_FILTER=""
        if [ -n "{{.SINCE}}" ]; then
          TIME_FILTER="--since={{.SINCE}}"
        fi

        echo -e "{{.INFO}} Dumping logs to $OUTPUT_FILE"
        SINCE_DISPLAY="{{.SINCE}}"
        if [ -z "$SINCE_DISPLAY" ]; then SINCE_DISPLAY="(all)"; fi
        echo -e "{{.INFO}} Lines: {{.LINES}}, Since: $SINCE_DISPLAY"

        if [ -n "$CONTAINER_ARGS" ]; then
          kubectl logs -n {{.K8S_NAMESPACE}} $SELECTOR $CONTAINER_ARGS --tail={{.LINES}} $TIME_FILTER --prefix=true --max-log-requests={{.MAX_LOG_REQUESTS}} 2>/dev/null > "$OUTPUT_FILE" || \
            kubectl logs -n {{.K8S_NAMESPACE}} $SELECTOR --tail={{.LINES}} $TIME_FILTER --prefix=true --max-log-requests={{.MAX_LOG_REQUESTS}} > "$OUTPUT_FILE"
        else
          kubectl logs -n {{.K8S_NAMESPACE}} $SELECTOR --tail={{.LINES}} $TIME_FILTER --prefix=true --max-log-requests={{.MAX_LOG_REQUESTS}} > "$OUTPUT_FILE"
        fi

        LINE_COUNT=$(wc -l < "$OUTPUT_FILE" | tr -d ' ')
        FILE_SIZE=$(ls -lh "$OUTPUT_FILE" | awk '{print $5}')

        echo -e "{{.SUCCESS}} Wrote $LINE_COUNT lines ($FILE_SIZE) to $OUTPUT_FILE"
        echo ""
        echo -e "{{.INFO}} Quick analysis commands:"
        echo "  View last 100 lines:  tail -100 $OUTPUT_FILE"
        echo "  Search for task:      grep -A50 'task_id' $OUTPUT_FILE"
        echo "  Search for errors:    grep -iE 'error|exception|failed' $OUTPUT_FILE"
        echo "  View in less:         less +G $OUTPUT_FILE"

  # ============================================================================
  # EXEC: Run commands in pods
  # ============================================================================
  exec:
    desc: "Execute command in pod (usage: task remote:exec ROLE=enum CMD=bash)"
    silent: true
    vars:
      ROLE: '{{.ROLE | default "enum"}}'
      CMD: '{{.CMD | default "bash"}}'
    cmds:
      - |
        POD=$(kubectl get pods -n {{.K8S_NAMESPACE}} -l ares.dreadnode.io/role={{.ROLE}} -o name 2>/dev/null | head -1)

        if [ -z "$POD" ]; then
          echo -e "{{.ERROR}} No pod found with role: {{.ROLE}}"
          echo -e "{{.INFO}} Available roles:"
          kubectl get pods -n {{.K8S_NAMESPACE}} -o json 2>/dev/null | \
            jq -r '.items[].metadata.labels["ares.dreadnode.io/role"] // empty' | sort -u | sed 's/^/  - /'
          exit 1
        fi

        echo -e "{{.INFO}} Executing in $POD..."
        if [ -n "{{.WORKER_CONTAINER}}" ]; then
          kubectl exec -it -n {{.K8S_NAMESPACE}} $POD -c {{.WORKER_CONTAINER}} -- {{.CMD}} 2>/dev/null || \
            kubectl exec -it -n {{.K8S_NAMESPACE}} $POD -- {{.CMD}}
        else
          kubectl exec -it -n {{.K8S_NAMESPACE}} $POD -- {{.CMD}}
        fi

  # ============================================================================
  # VERIFY: Check synced code
  # ============================================================================
  verify:
    desc: "Verify synced code in pod (usage: task remote:verify ROLE=enum FILE=core/worker.py)"
    silent: true
    vars:
      ROLE: '{{.ROLE | default "enum"}}'
      FILE: '{{.FILE | default "core/worker.py"}}'
    cmds:
      - |
        echo -e "{{.INFO}} Verifying {{.FILE}} in {{.ROLE}} agent..."
        echo "========================================"

        POD=$(kubectl get pods -n {{.K8S_NAMESPACE}} -l ares.dreadnode.io/role={{.ROLE}} -o name 2>/dev/null | head -1)

        if [ -z "$POD" ]; then
          echo -e "{{.ERROR}} No pod found with role: {{.ROLE}}"
          exit 1
        fi

        if [ -n "{{.WORKER_CONTAINER}}" ]; then
          kubectl exec -n {{.K8S_NAMESPACE}} $POD -c {{.WORKER_CONTAINER}} -- \
            head -50 {{.PVC_PATH}}/src/ares/{{.FILE}} 2>/dev/null || \
            kubectl exec -n {{.K8S_NAMESPACE}} $POD -- \
              head -50 {{.PVC_PATH}}/src/ares/{{.FILE}}
        else
          kubectl exec -n {{.K8S_NAMESPACE}} $POD -- \
            head -50 {{.PVC_PATH}}/src/ares/{{.FILE}}
        fi

  # ============================================================================
  # RUST BINARY DEPLOYMENT
  # ============================================================================
  rust:build:
    desc: "Cross-compile Rust binaries for Linux (K8s pods)"
    silent: true
    vars:
      DETECTED_ARCH:
        sh: |
          arch=$(kubectl get nodes -n {{.K8S_NAMESPACE}} -o jsonpath='{.items[0].status.nodeInfo.architecture}' 2>/dev/null || true)
          case "$arch" in
            arm64) echo "aarch64-unknown-linux-gnu" ;;
            amd64) echo "x86_64-unknown-linux-gnu" ;;
            *)     echo "x86_64-unknown-linux-gnu" ;;
          esac
      RUST_TARGET: '{{.RUST_TARGET | default .DETECTED_ARCH}}'
      MAX_OPEN_FILES: '{{.MAX_OPEN_FILES | default "8192"}}'
      CARGO_BUILD_JOBS: '{{.CARGO_BUILD_JOBS | default "4"}}'
    cmds:
      - |
        bash <<'EOF'
        set -euo pipefail

        echo -e "{{.INFO}} Cross-compiling for {{.RUST_TARGET}}..."

        BEFORE_ULIMIT=$(ulimit -n)
        if ulimit -n {{.MAX_OPEN_FILES}} 2>/dev/null; then
          echo -e "{{.INFO}} maxfiles: $BEFORE_ULIMIT -> $(ulimit -n)"
        else
          echo -e "{{.WARN}} Could not raise maxfiles (current: $BEFORE_ULIMIT)"
        fi

        export CARGO_BUILD_JOBS="{{.CARGO_BUILD_JOBS}}"
        echo -e "{{.INFO}} cargo build jobs: $CARGO_BUILD_JOBS"

        # Cross-compile: prefer cross on macOS (aws-lc-sys breaks under
        # zigbuild's Zig ar wrapper on Darwin), prefer zigbuild on Linux,
        # fall back to raw cargo
        if [ "$(uname)" = "Darwin" ] && command -v cross >/dev/null 2>&1; then
          cross build --release --target {{.RUST_TARGET}}
        elif command -v cargo-zigbuild >/dev/null 2>&1; then
          cargo zigbuild --release --target {{.RUST_TARGET}}
        elif command -v cross >/dev/null 2>&1; then
          cross build --release --target {{.RUST_TARGET}}
        else
          echo -e "{{.WARN}} No cross-compilation tool found, trying cargo with target..."
          echo -e "{{.INFO}} Install: cargo install cargo-zigbuild"
          cargo build --release --target {{.RUST_TARGET}}
        fi

        echo -e "{{.SUCCESS}} Binary built:"
        ls -lh target/{{.RUST_TARGET}}/release/ares 2>/dev/null || true
        EOF

  orchestrator:patch-wrapper:
    desc: "Patch the red orchestrator deployment wrapper to use ares instead of redis-cli"
    silent: true
    cmds:
      - |
        set -euo pipefail

        echo -e "{{.INFO}} Patching ares-orchestrator deployment wrapper..."
        kubectl patch deployment ares-orchestrator \
          -n {{.K8S_NAMESPACE}} \
          --type='json' \
          --patch-file .taskfiles/remote/orchestrator-wrapper-patch.json >/dev/null
        echo -e "{{.SUCCESS}} ares-orchestrator wrapper patched"

  check:
    desc: "Check if local Rust binaries match remote pods (usage: task remote:check [TEAM=red|blue|all])"
    silent: true
    vars:
      DETECTED_ARCH:
        sh: |
          arch=$(kubectl get nodes -n {{.K8S_NAMESPACE}} -o jsonpath='{.items[0].status.nodeInfo.architecture}' 2>/dev/null || true)
          case "$arch" in
            arm64) echo "aarch64-unknown-linux-gnu" ;;
            amd64) echo "x86_64-unknown-linux-gnu" ;;
            *)     echo "x86_64-unknown-linux-gnu" ;;
          esac
      RUST_TARGET: '{{.RUST_TARGET | default .DETECTED_ARCH}}'
      BIN_DIR: 'target/{{.RUST_TARGET}}/release'
      REMOTE_BIN_DIR: '/usr/local/bin'
    cmds:
      - |
        echo -e "{{.INFO}} Comparing local Rust binaries to remote pods (team={{.TEAM}})"
        echo ""

        # Check local binary exists
        if [ ! -f "{{.BIN_DIR}}/ares" ]; then
          echo -e "{{.ERROR}} Local binary not found: {{.BIN_DIR}}/ares. Run: task remote:rust:build"
          exit 1
        fi

        # Get pods based on team
        ORCH_PODS=""
        WORKER_PODS=""

        if [ "{{.TEAM}}" = "red" ] || [ "{{.TEAM}}" = "all" ]; then
          RED_ORCH=$(kubectl get pods -n {{.K8S_NAMESPACE}} \
            -l {{.RED_ORCH_LABEL}} \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -n "$RED_ORCH" ]; then
            ORCH_PODS="$RED_ORCH"
          fi

          RED_WORKERS=$(kubectl get pods -n {{.K8S_NAMESPACE}} \
            -l {{.RED_COMPONENT_LABEL}} \
            --field-selector=status.phase=Running \
            -o json | jq -r --arg orch "$RED_ORCH" \
              '.items[] | select(.metadata.name != $orch) | .metadata.name' \
              2>/dev/null | tr '\n' ' ')
          WORKER_PODS="$RED_WORKERS"
        fi

        if [ "{{.TEAM}}" = "blue" ] || [ "{{.TEAM}}" = "all" ]; then
          BLUE_ORCH=$(kubectl get pods -n {{.K8S_NAMESPACE}} \
            -l {{.BLUE_ORCH_LABEL}} \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -n "$BLUE_ORCH" ]; then
            ORCH_PODS="$ORCH_PODS $BLUE_ORCH"
          fi
        fi

        ORCH_PODS=$(echo "$ORCH_PODS" | xargs)
        WORKER_PODS=$(echo "$WORKER_PODS" | xargs)

        if [ -z "$ORCH_PODS" ] && [ -z "$WORKER_PODS" ]; then
          echo -e "{{.ERROR}} No running pods found for team={{.TEAM}}"
          exit 1
        fi

        ORCH_COUNT=$(echo "$ORCH_PODS" | wc -w | xargs)
        WORKER_COUNT=0
        [ -n "$WORKER_PODS" ] && WORKER_COUNT=$(echo "$WORKER_PODS" | wc -w | xargs)
        echo -e "{{.INFO}} Checking against $ORCH_COUNT orchestrator(s) + $WORKER_COUNT worker(s)"
        echo ""

        TOTAL_CHECKED=0
        TOTAL_MATCH=0
        TOTAL_DIFFER=0
        TOTAL_MISSING=0
        FAILED_PODS=""

        check_binary() {
          local bin_name="$1"
          local pod="$2"
          local local_hash="$3"

          remote_hash=$(kubectl exec -n {{.K8S_NAMESPACE}} "$pod" -- \
            sha256sum "{{.REMOTE_BIN_DIR}}/$bin_name" 2>/dev/null | awk '{print $1}')

          if [ -z "$remote_hash" ]; then
            echo "MISSING"
          elif [ "$remote_hash" != "$local_hash" ]; then
            echo "DIFFERS"
          else
            echo "OK"
          fi
        }

        # Check all pods: single ares binary
        local_hash=$(shasum -a 256 "{{.BIN_DIR}}/ares" | awk '{print $1}')
        ALL_PODS="$ORCH_PODS $WORKER_PODS"
        for pod in $ALL_PODS; do
          [ -z "$pod" ] && continue
          TOTAL_CHECKED=$((TOTAL_CHECKED + 1))

          result=$(check_binary "ares" "$pod" "$local_hash")
          case "$result" in
            OK)
              echo -e "{{.SUCCESS}} ares @ $pod: OK"
              TOTAL_MATCH=$((TOTAL_MATCH + 1))
              ;;
            MISSING)
              echo -e "{{.WARN}} ares @ $pod: MISSING"
              TOTAL_MISSING=$((TOTAL_MISSING + 1))
              echo "$FAILED_PODS" | grep -q "$pod" || FAILED_PODS="$FAILED_PODS $pod"
              ;;
            DIFFERS)
              echo -e "{{.ERROR}} ares @ $pod: DIFFERS"
              TOTAL_DIFFER=$((TOTAL_DIFFER + 1))
              echo "$FAILED_PODS" | grep -q "$pod" || FAILED_PODS="$FAILED_PODS $pod"
              ;;
          esac
        done

        echo ""
        echo "========================================"
        echo -e "{{.INFO}} Summary: $TOTAL_CHECKED checked, $TOTAL_MATCH match, $TOTAL_DIFFER differ, $TOTAL_MISSING missing"

        if [ "$TOTAL_DIFFER" -gt 0 ] || [ "$TOTAL_MISSING" -gt 0 ]; then
          FAILED_PODS=$(echo "$FAILED_PODS" | xargs)
          FAILED_COUNT=$(echo "$FAILED_PODS" | wc -w | xargs)
          echo -e "{{.WARN}} $FAILED_COUNT pod(s) out of sync"
          echo ""
          echo -e "{{.WARN}} Run 'task remote:rust:deploy TEAM={{.TEAM}}' to deploy binaries"
          exit 1
        else
          echo -e "{{.SUCCESS}} All binaries match on all pods"
        fi

  rust:deploy:
    desc: "Deploy Rust binaries to K8s pods (usage: task remote:rust:deploy [TEAM=red|blue|all])"
    silent: true
    vars:
      DETECTED_ARCH:
        sh: |
          arch=$(kubectl get nodes -n {{.K8S_NAMESPACE}} -o jsonpath='{.items[0].status.nodeInfo.architecture}' 2>/dev/null || true)
          case "$arch" in
            arm64) echo "aarch64-unknown-linux-gnu" ;;
            amd64) echo "x86_64-unknown-linux-gnu" ;;
            *)     echo "x86_64-unknown-linux-gnu" ;;
          esac
      RUST_TARGET: '{{.RUST_TARGET | default .DETECTED_ARCH}}'
      BIN_DIR: 'target/{{.RUST_TARGET}}/release'
      REMOTE_BIN_DIR: '/usr/local/bin'
    preconditions:
      - sh: test -f {{.BIN_DIR}}/ares
        msg: "Binary not found. Run: task remote:rust:build"
    cmds:
      - |
        echo -e "{{.INFO}} Deploying Rust binaries to pods in {{.K8S_NAMESPACE}}"

        ORCH_PODS=""
        WORKER_PODS=""

        if [ "{{.TEAM}}" = "red" ] || [ "{{.TEAM}}" = "all" ]; then
          ORCH_POD=$(kubectl get pods -n {{.K8S_NAMESPACE}} \
            -l {{.RED_ORCH_LABEL}} \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          [ -n "$ORCH_POD" ] && ORCH_PODS="$ORCH_POD"

          WORKER_PODS=$(kubectl get pods -n {{.K8S_NAMESPACE}} \
            -l {{.RED_COMPONENT_LABEL}} \
            --field-selector=status.phase=Running \
            -o json | jq -r ".items[] | select(.metadata.name != \"$ORCH_POD\") | .metadata.name" | tr '\n' ' ')
        fi

        if [ "{{.TEAM}}" = "blue" ] || [ "{{.TEAM}}" = "all" ]; then
          BLUE_ORCH=$(kubectl get pods -n {{.K8S_NAMESPACE}} \
            -l {{.BLUE_ORCH_LABEL}} \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          [ -n "$BLUE_ORCH" ] && ORCH_PODS="$ORCH_PODS $BLUE_ORCH"
        fi

        FAILED=0

        # Deploy single ares binary to all pods
        ALL_PODS="$ORCH_PODS $WORKER_PODS"
        for pod in $ALL_PODS; do
          [ -z "$pod" ] && continue
          echo -e "{{.INFO}} Deploying to: $pod"
          if kubectl cp "{{.BIN_DIR}}/ares" "$pod:{{.REMOTE_BIN_DIR}}/ares" \
              -n {{.K8S_NAMESPACE}} 2>/dev/null; then
            kubectl exec -n {{.K8S_NAMESPACE}} "$pod" -- chmod +x "{{.REMOTE_BIN_DIR}}/ares" 2>/dev/null
            echo -e "{{.SUCCESS}}   ares -> $pod"
          else
            echo -e "{{.ERROR}}   ares -> $pod FAILED"
            FAILED=$((FAILED + 1))
          fi
        done

        if [ $FAILED -eq 0 ]; then
          echo -e "{{.SUCCESS}} All binaries deployed successfully"
        else
          echo -e "{{.ERROR}} $FAILED deployment(s) failed"
          exit 1
        fi

  rust:deploy:quick:
    desc: "Build and deploy in one step (cross-compile + deploy)"
    cmds:
      - task: rust:build
      - task: rust:deploy

  rust:deploy:verify:
    desc: "Verify deployed binary versions on all pods"
    silent: true
    cmds:
      - |
        echo -e "{{.INFO}} Checking binary versions on pods..."

        ALL_PODS=$(kubectl get pods -n {{.K8S_NAMESPACE}} \
          --field-selector=status.phase=Running \
          -l 'ares.dreadnode.io/component in (red-team,blue-team)' \
          -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || true)

        ORCH_POD=$(kubectl get pods -n {{.K8S_NAMESPACE}} \
          -l {{.RED_ORCH_LABEL}} \
          --field-selector=status.phase=Running \
          -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)

        # Check all pods
        for pod in $ALL_PODS; do
          VER=$(kubectl exec -n {{.K8S_NAMESPACE}} "$pod" -- \
            ares --version 2>/dev/null || echo "NOT FOUND")
          echo "  $pod: $VER"
        done

  rust:deploy:config:
    desc: "Deploy config YAML to pods as ConfigMap"
    silent: true
    vars:
      CONFIG_FILE: '{{.CONFIG_FILE | default "config/ares.yaml"}}'
    cmds:
      - |
        echo -e "{{.INFO}} Creating/updating ConfigMap from {{.CONFIG_FILE}}"
        kubectl create configmap ares-config \
          --from-file=config.yaml={{.CONFIG_FILE}} \
          -n {{.K8S_NAMESPACE}} \
          --dry-run=client -o yaml | kubectl apply -f -
        echo -e "{{.SUCCESS}} ConfigMap ares-config updated"
        echo -e "{{.INFO}} Pods will pick up changes on next restart"
        echo -e "{{.INFO}} To restart now: task remote:rollout TEAM=red"

  rust:deploy:agents:
    desc: "Sync Python agent scripts to pods (minimal set needed by Rust worker)"
    silent: true
    cmds:
      - |
        echo -e "{{.INFO}} Syncing Python agent scripts..."

        # Only these Python files are needed by the Rust worker/orchestrator:
        AGENT_FILES=(
          "src/ares/agents/__init__.py"
          "src/ares/agents/red_team.py"
          "src/ares/agents/blue_team.py"
          "src/ares/tools/"
          "src/ares/templates/"
        )

        # Find all pods
        PODS=$(kubectl get pods -n {{.K8S_NAMESPACE}} \
          --field-selector=status.phase=Running \
          -l 'ares.dreadnode.io/component' \
          -o jsonpath='{.items[*].metadata.name}')

        for pod in $PODS; do
          echo -e "{{.INFO}} Syncing agents to $pod"
          for path in "${AGENT_FILES[@]}"; do
            if [ -d "$path" ]; then
              kubectl cp "$path" "$pod:/opt/ares/$(basename $path)" \
                -n {{.K8S_NAMESPACE}} 2>/dev/null && \
              echo -e "{{.SUCCESS}}   $path -> $pod" || \
              echo -e "{{.WARN}}   $path -> $pod (failed)"
            elif [ -f "$path" ]; then
              kubectl cp "$path" "$pod:/opt/ares/agents/$(basename $path)" \
                -n {{.K8S_NAMESPACE}} 2>/dev/null && \
              echo -e "{{.SUCCESS}}   $path -> $pod" || \
              echo -e "{{.WARN}}   $path -> $pod (failed)"
            fi
          done
        done
