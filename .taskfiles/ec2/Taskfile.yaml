---
# EC2 deployment tasks — run ares directly on EC2 via AWS SSM
# Alternative to K8s for faster testing iterations.
#
# Architecture: single EC2 with Redis + orchestrator + all worker roles.
# Workers run as systemd template units (ares@{role}).
# Orchestrator runs per-operation (not a service).
#
# Usage:
#   task ec2:setup EC2_NAME=ares-tools       # One-time: install Redis, create systemd units
#   task ec2:deploy EC2_NAME=ares-tools      # Build + push Rust binaries via S3 + SSM
#   task ec2:start EC2_NAME=ares-tools       # Start Redis + workers
#   task ec2:status EC2_NAME=ares-tools      # Show process status
#   task ec2:redis:forward EC2_NAME=ares-tools  # Port-forward Redis for local CLI
#   task ec2:logs EC2_NAME=ares-tools ROLE=lateral  # Tail worker logs
version: "3"

set: [errexit, pipefail]

vars:
  INFO: '\033[0;34m[INFO]\033[0m'
  SUCCESS: '\033[0;32m[SUCCESS]\033[0m'
  ERROR: '\033[0;31m[ERROR]\033[0m'
  WARN: '\033[1;33m[WARN]\033[0m'
  # EC2 instance identification (Name tag filter)
  EC2_NAME: '{{.EC2_NAME | default "kali-ares"}}'
  EC2_PROFILE: '{{.EC2_PROFILE | default "lab"}}'
  EC2_REGION: '{{.EC2_REGION | default "us-west-1"}}'
  # S3 bucket for file staging (required; pass S3_BUCKET=your-bucket or set as env var)
  S3_BUCKET: '{{.S3_BUCKET | default ""}}'
  # Remote paths on EC2
  ARES_REMOTE_BIN: '/usr/local/bin'
  ARES_REMOTE_CONFIG: '/etc/ares/config.yaml'
  ARES_LOG_DIR: '/var/log/ares'
  # Build tool: auto (cross on macOS due to aws-lc-sys, zigbuild on Linux), cross, zigbuild, cargo, remote
  # remote: builds natively on EC2 (fastest for iteration, no cross-compilation)
  BUILD_TOOL: '{{.BUILD_TOOL | default "auto"}}'
  # Build profile: release (optimized) or dev-deploy (fast compile, less optimized)
  BUILD_PROFILE: '{{.BUILD_PROFILE | default "dev-deploy"}}'
  REMOTE_BUILD_DIR: '/tmp/ares-build'
  # Worker roles
  WORKER_ROLES: 'recon credential_access cracker acl privesc lateral coercion'
  # Worker mode: tool_exec (Rust LLM orchestrator) or task (Python-style)
  WORKER_MODE: '{{.WORKER_MODE | default "tool_exec"}}'
  # Loki deployment label for blue team queries
  EC2_DEPLOYMENT: '{{.EC2_DEPLOYMENT | default "alpha-operator-range"}}'

tasks:
  # ============================================================================
  # Instance Resolution
  # ============================================================================
  resolve:
    desc: "Show resolved EC2 instance ID and IP (usage: task ec2:resolve [EC2_NAME=ares-tools])"
    silent: true
    cmds:
      - |
        INSTANCE_INFO=$(aws ec2 describe-instances \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --filters "Name=instance-state-name,Values=running" \
                    "Name=tag:Name,Values=*{{.EC2_NAME}}*" \
          --query "Reservations[*].Instances[*].[InstanceId,PrivateIpAddress,Tags[?Key==\`Name\`].Value|[0]]" \
          --output text)

        if [ -z "$INSTANCE_INFO" ]; then
          echo -e "{{.ERROR}} No running instance found matching Name tag: {{.EC2_NAME}}"
          exit 1
        fi

        echo -e "{{.SUCCESS}} Resolved EC2 instance:"
        echo "$INSTANCE_INFO" | while read -r id ip name; do
          echo "  Instance ID: $id"
          echo "  Private IP:  $ip"
          echo "  Name:        $name"
        done

  # ============================================================================
  # Binary Deployment
  # ============================================================================
  deploy:
    desc: "Cross-compile Rust binaries and deploy to EC2 via S3 staging (usage: task ec2:deploy [EC2_NAME=ares-tools])"
    silent: true
    vars:
      RUST_TARGET: '{{.RUST_TARGET | default "x86_64-unknown-linux-gnu"}}'
      MAX_OPEN_FILES: '{{.MAX_OPEN_FILES | default "65536"}}'
      CARGO_BUILD_JOBS: '{{.CARGO_BUILD_JOBS | default "0"}}'
      S3_DEPLOY_PREFIX: 'ares-deploy'
    preconditions:
      - sh: aws sts get-caller-identity --profile "{{.EC2_PROFILE}}" --region "{{.EC2_REGION}}" >/dev/null 2>&1
        msg: "Not logged into AWS (profile: {{.EC2_PROFILE}}). Run: aws sso login --profile {{.EC2_PROFILE}}"
      - sh: test -n "{{.S3_BUCKET}}"
        msg: "S3_BUCKET not set. Pass S3_BUCKET=your-bucket or export it as an env var."
    cmds:
      # Build binaries (local cross-compile or remote native build)
      - |
        BUILD_TOOL="{{.BUILD_TOOL}}"

        # Resolve 'auto': cross is required on macOS because aws-lc-sys
        # (pulled by rustls/reqwest) fails under zigbuild's Zig AR wrapper.
        # On Linux, prefer zigbuild (no Docker overhead).
        if [ "$BUILD_TOOL" = "auto" ]; then
          if [ "$(uname)" = "Darwin" ] && command -v cross >/dev/null 2>&1; then
            BUILD_TOOL="cross"
          elif command -v cargo-zigbuild >/dev/null 2>&1; then
            BUILD_TOOL="zigbuild"
          elif command -v cross >/dev/null 2>&1; then
            BUILD_TOOL="cross"
          else
            BUILD_TOOL="cargo"
          fi
        fi

        echo -e "{{.INFO}} Using build tool: $BUILD_TOOL"

        # --- remote: build natively on EC2 (no cross-compilation) ---
        if [ "$BUILD_TOOL" = "remote" ]; then
          echo -e "{{.INFO}} Building natively on EC2..."

          # Resolve instance
          INSTANCE_ID=$(aws ec2 describe-instances \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --filters "Name=instance-state-name,Values=running" \
                      "Name=tag:Name,Values=*{{.EC2_NAME}}*" \
            --query "Reservations[*].Instances[*].InstanceId" \
            --output text | head -1)
          if [ -z "$INSTANCE_ID" ]; then
            echo -e "{{.ERROR}} No running instance found matching: {{.EC2_NAME}}"
            exit 1
          fi

          # Create source tarball (exclude build artifacts and git metadata)
          SRC_TAR=$(mktemp /tmp/ares-src-XXXXXX.tar.gz)
          trap "rm -f $SRC_TAR" EXIT
          tar -czf "$SRC_TAR" \
            --exclude='target' --exclude='.git' --exclude='*.o' --exclude='*.d' \
            -C "$(pwd)" Cargo.toml Cargo.lock Cross.toml tools.yaml .cargo/ ares-core/ ares-cli/ ares-llm/ ares-tools/

          # Upload source to S3
          echo -e "{{.INFO}} Uploading source to S3..."
          aws s3 cp "$SRC_TAR" "s3://{{.S3_BUCKET}}/{{.S3_DEPLOY_PREFIX}}/ares-src.tar.gz" \
            --profile "{{.EC2_PROFILE}}" --region "{{.EC2_REGION}}"

          # Build on EC2 via SSM
          echo -e "{{.INFO}} Building on $INSTANCE_ID (this may take a few minutes on first run)..."
          PARAMS_FILE=$(mktemp)
          trap "rm -f $SRC_TAR $PARAMS_FILE" EXIT
          jq -n \
            --arg bucket "{{.S3_BUCKET}}" \
            --arg prefix "{{.S3_DEPLOY_PREFIX}}" \
            --arg build_dir "{{.REMOTE_BUILD_DIR}}" \
            '{"commands": [
              "set -ex",
              "mkdir -p " + $build_dir,
              "aws s3 cp s3://" + $bucket + "/" + $prefix + "/ares-src.tar.gz /tmp/ares-src.tar.gz",
              "tar -xzf /tmp/ares-src.tar.gz -C " + $build_dir,
              "cd " + $build_dir + " && cargo build --profile dev-deploy -p ares-cli 2>&1",
              "SRC=" + $build_dir + "/target/dev-deploy/ares",
              "if [ ! -f \"$SRC\" ]; then echo ERROR: build artifact missing at $SRC; exit 1; fi",
              "BUILD_RAW=$(sha256sum \"$SRC\"); BUILD_SHA=${BUILD_RAW%% *}",
              "echo Build SHA: $BUILD_SHA",
              "install -m 755 \"$SRC\" /usr/local/bin/ares",
              "DEPLOY_RAW=$(sha256sum /usr/local/bin/ares); DEPLOY_SHA=${DEPLOY_RAW%% *}",
              "echo Deploy SHA: $DEPLOY_SHA",
              "if [ \"$BUILD_SHA\" != \"$DEPLOY_SHA\" ]; then echo ERROR: deployed sha differs from build artifact build=$BUILD_SHA deploy=$DEPLOY_SHA; exit 1; fi",
              "echo Deployed: && ls -lh /usr/local/bin/ares"
            ]}' > "$PARAMS_FILE"

          # Clean cargo builds on a t3.medium can run 15-25 min — pre-EC2-reboot
          # cache may be wiped, and incremental builds still need to relink.
          # Allow 30 min total for both the SSM command itself and the local
          # polling loop so we don't bail mid-build with a "InProgress" report.
          CMD_ID=$(aws ssm send-command \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "file://$PARAMS_FILE" \
            --timeout-seconds 1800 \
            --query "Command.CommandId" --output text)

          # Poll for completion (up to 30 minutes)
          for i in $(seq 1 900); do
            STATUS=$(aws ssm get-command-invocation \
              --profile "{{.EC2_PROFILE}}" \
              --region "{{.EC2_REGION}}" \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null) || true
            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut) break ;;
            esac
            sleep 2
          done

          # Show build output
          OUTPUT=$(aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" --output text 2>/dev/null)
          echo "$OUTPUT" | tail -20

          if [ "$STATUS" != "Success" ]; then
            DETAILS=$(aws ssm get-command-invocation \
              --profile "{{.EC2_PROFILE}}" \
              --region "{{.EC2_REGION}}" \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StatusDetails" --output text 2>/dev/null)
            echo -e "{{.ERROR}} Remote build failed (status: $STATUS, details: $DETAILS)"
            if [ "$DETAILS" = "Undeliverable" ]; then
              echo -e "{{.ERROR}} SSM could not deliver the command to $INSTANCE_ID (PingStatus likely ConnectionLost)."
              echo -e "{{.ERROR}} Recovery: reboot the instance ('aws ec2 reboot-instances --instance-ids $INSTANCE_ID')."
            fi
            aws ssm get-command-invocation \
              --profile "{{.EC2_PROFILE}}" \
              --region "{{.EC2_REGION}}" \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" --output text
            exit 1
          fi

          echo -e "{{.SUCCESS}} Remote build + deploy complete"
          exit 0
        fi

        # --- local cross-compilation path ---
        PROFILE="{{.BUILD_PROFILE}}"
        if [ "$PROFILE" = "release" ]; then
          PROFILE_FLAG="--release"
          BIN_SUBDIR="release"
        else
          PROFILE_FLAG="--profile $PROFILE"
          BIN_SUBDIR="$PROFILE"
        fi

        echo -e "{{.INFO}} Cross-compiling for {{.RUST_TARGET}} (profile: $PROFILE, jobs: {{.CARGO_BUILD_JOBS}})..."
        echo -e "{{.INFO}} FD limit inherited from parent: $(sh -c 'ulimit -n' 2>/dev/null || echo unknown)"

        # Zig 0.15+ rejects RLIM_INFINITY on the *hard* fd limit (returns
        # ProcessFdQuotaExceeded mid-link). On macOS, default zsh/bash sessions
        # have soft=1048576 but hard=RLIM_INFINITY (`getrlimit` returns INT64_MAX),
        # so even a high soft limit isn't enough — Zig sees the unlimited hard
        # limit and bails. `ulimit -n N` sets both soft and hard to N, which is
        # exactly what we want. Always pin to a concrete value, regardless of
        # the current setting.
        ulimit -n {{.MAX_OPEN_FILES}} 2>/dev/null || ulimit -n 10240 2>/dev/null || ulimit -n 4096 2>/dev/null || true

        JOBS="{{.CARGO_BUILD_JOBS}}"
        if [ "$JOBS" = "0" ]; then
          # 0 = use all available cores (cargo default)
          JOBS_FLAG=""
        else
          JOBS_FLAG="-j $JOBS"
        fi

        # Use sccache if available for dependency caching
        if command -v sccache >/dev/null 2>&1; then
          export RUSTC_WRAPPER=sccache
          echo -e "{{.INFO}} Using sccache for compilation caching"
        fi

        case "$BUILD_TOOL" in
          cross)
            # Override linker: container has x86_64-linux-gnu-gcc, not x86_64-unknown-linux-gnu-gcc.
            export CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=x86_64-linux-gnu-gcc
            # Use CMake builder for aws-lc-sys (CC builder fails due to GCC memcmp bug #95189)
            export AWS_LC_SYS_CMAKE_BUILDER=1
            cross build $PROFILE_FLAG --target {{.RUST_TARGET}} $JOBS_FLAG -p ares-cli
            ;;
          zigbuild)
            cargo zigbuild $PROFILE_FLAG --target {{.RUST_TARGET}} $JOBS_FLAG -p ares-cli
            ;;
          cargo)
            echo -e "{{.WARN}} Using plain cargo (no cross-compilation toolchain)..."
            cargo build $PROFILE_FLAG --target {{.RUST_TARGET}} $JOBS_FLAG -p ares-cli
            ;;
          *)
            echo -e "{{.ERROR}} Unknown BUILD_TOOL: $BUILD_TOOL (valid: auto, cross, zigbuild, cargo, remote)"
            exit 1
            ;;
        esac

        echo -e "{{.SUCCESS}} Binary built:"
        ls -lh "target/{{.RUST_TARGET}}/$BIN_SUBDIR/ares" 2>/dev/null || true

      # Upload to S3 staging (skip for remote builds)
      - |
        if [ "{{.BUILD_TOOL}}" = "remote" ]; then exit 0; fi

        PROFILE="{{.BUILD_PROFILE}}"
        if [ "$PROFILE" = "release" ]; then
          BIN_SUBDIR="release"
        else
          BIN_SUBDIR="$PROFILE"
        fi
        BIN_PATH="target/{{.RUST_TARGET}}/$BIN_SUBDIR/ares"

        # Strip debug symbols if profile doesn't handle it (release profile without strip)
        if [ "$PROFILE" = "release" ]; then
          echo -e "{{.INFO}} Stripping binary..."
          STRIP_BIN="x86_64-linux-gnu-strip"
          if ! command -v "$STRIP_BIN" >/dev/null 2>&1; then
            STRIP_BIN="strip"
          fi
          $STRIP_BIN "$BIN_PATH" 2>/dev/null || echo -e "{{.WARN}} Strip failed (non-fatal)"
        fi
        ls -lh "$BIN_PATH"

        # Pin sha256 of what we're about to ship so the SSM deploy step can
        # verify the binary that lands on /usr/local/bin/ares matches exactly.
        # Without this, the cp can silently fail to overwrite (ETXTBSY, immutable
        # attribute, symlink redirection, prior deploy race) and the task still
        # reports success.
        if command -v sha256sum >/dev/null 2>&1; then
          BUILD_SHA=$(sha256sum "$BIN_PATH" | awk '{print $1}')
        else
          BUILD_SHA=$(shasum -a 256 "$BIN_PATH" | awk '{print $1}')
        fi
        echo -e "{{.INFO}} Build SHA: $BUILD_SHA"
        mkdir -p target/.deploy
        echo "$BUILD_SHA" > target/.deploy/ares.sha256

        echo -e "{{.INFO}} Uploading binary to s3://{{.S3_BUCKET}}/{{.S3_DEPLOY_PREFIX}}/..."
        aws s3 cp "$BIN_PATH" "s3://{{.S3_BUCKET}}/{{.S3_DEPLOY_PREFIX}}/ares" \
          --profile "{{.EC2_PROFILE}}" --region "{{.EC2_REGION}}"

        echo -e "{{.SUCCESS}} Binary staged in S3 (sha=$BUILD_SHA)"

      # Pull from S3 on EC2 via SSM + verify (skip for remote builds)
      - |
        if [ "{{.BUILD_TOOL}}" = "remote" ]; then exit 0; fi

        INSTANCE_ID=$(aws ec2 describe-instances \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --filters "Name=instance-state-name,Values=running" \
                    "Name=tag:Name,Values=*{{.EC2_NAME}}*" \
          --query "Reservations[*].Instances[*].InstanceId" \
          --output text | head -1)

        if [ -z "$INSTANCE_ID" ]; then
          echo -e "{{.ERROR}} No running instance found matching: {{.EC2_NAME}}"
          exit 1
        fi

        echo -e "{{.INFO}} Pulling binaries from S3 to $INSTANCE_ID..."

        EXPECTED_SHA=""
        if [ -f target/.deploy/ares.sha256 ]; then
          EXPECTED_SHA=$(cat target/.deploy/ares.sha256)
        fi

        PARAMS_FILE=$(mktemp)
        trap "rm -f $PARAMS_FILE" EXIT
        jq -n \
          --arg bucket "{{.S3_BUCKET}}" \
          --arg prefix "{{.S3_DEPLOY_PREFIX}}" \
          --arg expected_sha "$EXPECTED_SHA" \
          '{"commands": [
            "set -ex",
            "aws s3 cp s3://" + $bucket + "/" + $prefix + "/ares /tmp/ares.staged",
            "STAGED_RAW=$(sha256sum /tmp/ares.staged); STAGED_SHA=${STAGED_RAW%% *}",
            "echo Staged SHA: $STAGED_SHA",
            "if [ -n \"" + $expected_sha + "\" ] && [ \"$STAGED_SHA\" != \"" + $expected_sha + "\" ]; then echo ERROR: S3 staged binary sha mismatch expected=" + $expected_sha + " staged=$STAGED_SHA; exit 1; fi",
            "install -m 755 /tmp/ares.staged /usr/local/bin/ares",
            "DEPLOY_RAW=$(sha256sum /usr/local/bin/ares); DEPLOY_SHA=${DEPLOY_RAW%% *}",
            "echo Deploy SHA: $DEPLOY_SHA",
            "if [ \"$STAGED_SHA\" != \"$DEPLOY_SHA\" ]; then echo ERROR: deployed sha differs from staged staged=$STAGED_SHA deploy=$DEPLOY_SHA; exit 1; fi",
            "rm -f /tmp/ares.staged",
            "echo Deployed: && ls -lh /usr/local/bin/ares"
          ]}' > "$PARAMS_FILE"

        CMD_ID=$(aws ssm send-command \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --instance-ids "$INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --parameters "file://$PARAMS_FILE" \
          --query "Command.CommandId" --output text)

        # Poll for completion
        for i in $(seq 1 120); do
          STATUS=$(aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" --output text 2>/dev/null) || true
          case "$STATUS" in
            Success|Failed|Cancelled|TimedOut) break ;;
          esac
          sleep 2
        done

        aws ssm get-command-invocation \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --command-id "$CMD_ID" \
          --instance-id "$INSTANCE_ID" \
          --query "StandardOutputContent" --output text

        if [ "$STATUS" != "Success" ]; then
          # StatusDetails distinguishes script failure (script returned non-zero) from
          # delivery failure (Undeliverable = SSM agent on instance is offline / instance
          # in ConnectionLost). For Undeliverable, stdout/stderr are both empty, so
          # without this the operator sees only "status: Failed" and two blank lines.
          DETAILS=$(aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StatusDetails" --output text 2>/dev/null)
          echo -e "{{.ERROR}} Deploy failed (status: $STATUS, details: $DETAILS)"
          if [ "$DETAILS" = "Undeliverable" ]; then
            echo -e "{{.ERROR}} SSM could not deliver the command to $INSTANCE_ID."
            echo -e "{{.ERROR}} Check 'aws ssm describe-instance-information' — PingStatus is likely ConnectionLost."
            echo -e "{{.ERROR}} Recovery: reboot the instance ('aws ec2 reboot-instances --instance-ids $INSTANCE_ID')."
          fi
          aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardErrorContent" --output text
          exit 1
        fi

        echo -e "{{.SUCCESS}} Deploy complete"

      # Also deploy config
      - task: deploy:config
        vars:
          EC2_NAME: '{{.EC2_NAME}}'

  deploy:config:
    desc: "Push config.yaml to EC2 via S3 staging (usage: task ec2:deploy:config [EC2_NAME=ares-tools] [ARES_CONFIG=./config/ares.yaml])"
    silent: true
    vars:
      ARES_CONFIG: '{{.ARES_CONFIG | default "./config/ares.yaml"}}'
      S3_DEPLOY_PREFIX: 'ares-deploy'
    preconditions:
      - sh: test -f "{{.ARES_CONFIG}}"
        msg: "Config file not found: {{.ARES_CONFIG}}"
      - sh: test -n "{{.S3_BUCKET}}"
        msg: "S3_BUCKET not set. Pass S3_BUCKET=your-bucket or export it as an env var."
    cmds:
      - |
        INSTANCE_ID=$(aws ec2 describe-instances \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --filters "Name=instance-state-name,Values=running" \
                    "Name=tag:Name,Values=*{{.EC2_NAME}}*" \
          --query "Reservations[*].Instances[*].InstanceId" \
          --output text | head -1)

        if [ -z "$INSTANCE_ID" ]; then
          echo -e "{{.ERROR}} No running instance found matching: {{.EC2_NAME}}"
          exit 1
        fi

        echo -e "{{.INFO}} Uploading config to S3..."
        aws s3 cp "{{.ARES_CONFIG}}" "s3://{{.S3_BUCKET}}/{{.S3_DEPLOY_PREFIX}}/config.yaml" \
          --profile "{{.EC2_PROFILE}}" --region "{{.EC2_REGION}}"

        echo -e "{{.INFO}} Pulling config to $INSTANCE_ID..."
        PARAMS_FILE=$(mktemp)
        trap "rm -f $PARAMS_FILE" EXIT
        jq -n --arg bucket "{{.S3_BUCKET}}" --arg prefix "{{.S3_DEPLOY_PREFIX}}" \
          '{"commands": ["mkdir -p /etc/ares && aws s3 cp s3://" + $bucket + "/" + $prefix + "/config.yaml /etc/ares/config.yaml && echo Config deployed: && cat /etc/ares/config.yaml | head -5"]}' \
          > "$PARAMS_FILE"

        CMD_ID=$(aws ssm send-command \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --instance-ids "$INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --parameters "file://$PARAMS_FILE" \
          --query "Command.CommandId" --output text)

        for i in $(seq 1 30); do
          STATUS=$(aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" --output text 2>/dev/null) || true
          case "$STATUS" in
            Success|Failed|Cancelled|TimedOut) break ;;
          esac
          sleep 1
        done

        aws ssm get-command-invocation \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --command-id "$CMD_ID" \
          --instance-id "$INSTANCE_ID" \
          --query "StandardOutputContent" --output text

        if [ "$STATUS" != "Success" ]; then
          DETAILS=$(aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StatusDetails" --output text 2>/dev/null)
          echo -e "{{.ERROR}} Config deploy failed (status: $STATUS, details: $DETAILS)"
          if [ "$DETAILS" = "Undeliverable" ]; then
            echo -e "{{.ERROR}} SSM could not deliver the command to $INSTANCE_ID (PingStatus likely ConnectionLost)."
            echo -e "{{.ERROR}} Recovery: reboot the instance ('aws ec2 reboot-instances --instance-ids $INSTANCE_ID')."
          fi
          aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardErrorContent" --output text
          exit 1
        fi

        echo -e "{{.SUCCESS}} Config deployed to $INSTANCE_ID:{{.ARES_REMOTE_CONFIG}}"

  # ============================================================================
  # One-Time Setup
  # ============================================================================
  setup:
    desc: "One-time EC2 setup: install Redis, create log dirs, install systemd units (usage: task ec2:setup [EC2_NAME=ares-tools])"
    silent: true
    cmds:
      - |
        INSTANCE_ID=$(aws ec2 describe-instances \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --filters "Name=instance-state-name,Values=running" \
                    "Name=tag:Name,Values=*{{.EC2_NAME}}*" \
          --query "Reservations[*].Instances[*].InstanceId" \
          --output text | head -1)

        if [ -z "$INSTANCE_ID" ]; then
          echo -e "{{.ERROR}} No running instance found matching: {{.EC2_NAME}}"
          exit 1
        fi

        echo -e "{{.INFO}} Setting up ares on $INSTANCE_ID..."

        # JSON-encode the setup script for SSM
        PARAMS_FILE=$(mktemp)
        trap "rm -f $PARAMS_FILE" EXIT
        jq -Rs '{"commands": [.]}' < .taskfiles/ec2/scripts/setup.sh > "$PARAMS_FILE"

        CMD_ID=$(aws ssm send-command \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --instance-ids "$INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --parameters "file://$PARAMS_FILE" \
          --timeout-seconds 120 \
          --query "Command.CommandId" --output text)

        echo -e "{{.INFO}} Waiting for setup to complete (command: $CMD_ID)..."

        for i in $(seq 1 120); do
          STATUS=$(aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" --output text 2>/dev/null) || true
          case "$STATUS" in
            Success|Failed|Cancelled|TimedOut) break ;;
          esac
          sleep 1
        done

        echo ""
        aws ssm get-command-invocation \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --command-id "$CMD_ID" \
          --instance-id "$INSTANCE_ID" \
          --query "StandardOutputContent" --output text

        if [ "$STATUS" != "Success" ]; then
          DETAILS=$(aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StatusDetails" --output text 2>/dev/null)
          echo -e "{{.ERROR}} Setup failed (status: $STATUS, details: $DETAILS)"
          if [ "$DETAILS" = "Undeliverable" ]; then
            echo -e "{{.ERROR}} SSM could not deliver the command to $INSTANCE_ID (PingStatus likely ConnectionLost)."
            echo -e "{{.ERROR}} Recovery: reboot the instance ('aws ec2 reboot-instances --instance-ids $INSTANCE_ID')."
          fi
          aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardErrorContent" --output text
          exit 1
        fi

        echo -e "{{.SUCCESS}} EC2 setup complete"

  # ============================================================================
  # Process Management
  # ============================================================================
  start:
    desc: "Start Redis + all worker roles on EC2 (usage: task ec2:start [EC2_NAME=ares-tools])"
    silent: true
    cmds:
      - |
        INSTANCE_ID=$(aws ec2 describe-instances \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --filters "Name=instance-state-name,Values=running" \
                    "Name=tag:Name,Values=*{{.EC2_NAME}}*" \
          --query "Reservations[*].Instances[*].InstanceId" \
          --output text | head -1)

        if [ -z "$INSTANCE_ID" ]; then
          echo -e "{{.ERROR}} No running instance found matching: {{.EC2_NAME}}"
          exit 1
        fi

        # Build systemctl start command for all roles
        WORKER_UNITS=""
        for role in {{.WORKER_ROLES}}; do
          WORKER_UNITS="$WORKER_UNITS ares@${role}.service"
        done

        echo -e "{{.INFO}} Starting ares services on $INSTANCE_ID..."

        PARAMS_FILE=$(mktemp)
        trap "rm -f $PARAMS_FILE" EXIT
        START_CMD="systemctl start redis-server 2>/dev/null || systemctl start redis; sleep 1; redis-cli ping; "
        START_CMD+="systemctl start nats-server; sleep 1; curl -fsS http://127.0.0.1:8222/varz >/dev/null && echo 'NATS OK' || echo 'NATS NOT RUNNING'; "
        START_CMD+="systemctl start $WORKER_UNITS; sleep 2; echo Worker status:; "
        START_CMD+='for role in recon credential_access cracker acl privesc lateral coercion; do '
        START_CMD+='st=$(systemctl is-active ares@${role} 2>/dev/null || echo dead); '
        START_CMD+='printf "  %-20s %s\n" $role $st; done'
        jq -n --arg cmd "$START_CMD" '{"commands": [$cmd]}' > "$PARAMS_FILE"

        CMD_ID=$(aws ssm send-command \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --instance-ids "$INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --parameters "file://$PARAMS_FILE" \
          --query "Command.CommandId" --output text)

        for i in $(seq 1 30); do
          STATUS=$(aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" --output text 2>/dev/null) || true
          case "$STATUS" in
            Success|Failed|Cancelled|TimedOut) break ;;
          esac
          sleep 1
        done

        aws ssm get-command-invocation \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --command-id "$CMD_ID" \
          --instance-id "$INSTANCE_ID" \
          --query "StandardOutputContent" --output text

        if [ "$STATUS" = "Success" ]; then
          echo -e "{{.SUCCESS}} All services started"
        else
          DETAILS=$(aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StatusDetails" --output text 2>/dev/null)
          echo -e "{{.ERROR}} Start failed (status: $STATUS, details: $DETAILS)"
          if [ "$DETAILS" = "Undeliverable" ]; then
            echo -e "{{.ERROR}} SSM could not deliver the command to $INSTANCE_ID (PingStatus likely ConnectionLost)."
            echo -e "{{.ERROR}} Recovery: reboot the instance ('aws ec2 reboot-instances --instance-ids $INSTANCE_ID')."
          fi
          aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardErrorContent" --output text
          exit 1
        fi

  stop:
    desc: "Stop all worker roles on EC2 (keeps Redis running) (usage: task ec2:stop [EC2_NAME=ares-tools])"
    silent: true
    cmds:
      - |
        INSTANCE_ID=$(aws ec2 describe-instances \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --filters "Name=instance-state-name,Values=running" \
                    "Name=tag:Name,Values=*{{.EC2_NAME}}*" \
          --query "Reservations[*].Instances[*].InstanceId" \
          --output text | head -1)

        if [ -z "$INSTANCE_ID" ]; then
          echo -e "{{.ERROR}} No running instance found matching: {{.EC2_NAME}}"
          exit 1
        fi

        WORKER_UNITS=""
        for role in {{.WORKER_ROLES}}; do
          WORKER_UNITS="$WORKER_UNITS ares@${role}.service"
        done

        echo -e "{{.INFO}} Stopping ares services on $INSTANCE_ID..."

        PARAMS_FILE=$(mktemp)
        trap "rm -f $PARAMS_FILE" EXIT
        jq -n --arg units "$WORKER_UNITS" '{"commands": ["systemctl stop " + $units + " 2>/dev/null || true; pkill -f \"ares orchestrator\" 2>/dev/null || true; echo Stopped all ares workers and orchestrator"]}' > "$PARAMS_FILE"

        CMD_ID=$(aws ssm send-command \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --instance-ids "$INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --parameters "file://$PARAMS_FILE" \
          --query "Command.CommandId" --output text)

        for i in $(seq 1 15); do
          STATUS=$(aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" --output text 2>/dev/null) || true
          case "$STATUS" in
            Success|Failed|Cancelled|TimedOut) break ;;
          esac
          sleep 1
        done

        aws ssm get-command-invocation \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --command-id "$CMD_ID" \
          --instance-id "$INSTANCE_ID" \
          --query "StandardOutputContent" --output text

        echo -e "{{.SUCCESS}} Services stopped (Redis still running)"

  stop-op:
    desc: "Stop a specific operation gracefully (usage: task ec2:stop-op [EC2_NAME=ares-tools] [OPERATION_ID=op-xxx] [LATEST=true])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      LATEST: '{{.LATEST | default "false"}}'
    preconditions:
      - sh: '[ -n "{{.OPERATION_ID}}" ] || [ "{{.LATEST}}" = "true" ]'
        msg: "Provide OPERATION_ID=op-xxx or LATEST=true"
    cmd: >-
      ares --ec2 {{.EC2_NAME}} --ec2-profile {{.EC2_PROFILE}} --ec2-region {{.EC2_REGION}}
      ops stop
      {{if ne .OPERATION_ID ""}}{{.OPERATION_ID}}{{end}}
      {{if eq .LATEST "true"}}--latest{{end}}

  restart:
    desc: "Restart all worker roles on EC2 (usage: task ec2:restart [EC2_NAME=ares-tools])"
    silent: true
    cmds:
      - task: stop
      - task: start

  # ============================================================================
  # Status & Monitoring
  # ============================================================================
  status:
    desc: "Show ares process status on EC2 (usage: task ec2:status [EC2_NAME=ares-tools])"
    silent: true
    cmds:
      - |
        INSTANCE_ID=$(aws ec2 describe-instances \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --filters "Name=instance-state-name,Values=running" \
                    "Name=tag:Name,Values=*{{.EC2_NAME}}*" \
          --query "Reservations[*].Instances[*].InstanceId" \
          --output text | head -1)

        if [ -z "$INSTANCE_ID" ]; then
          echo -e "{{.ERROR}} No running instance found matching: {{.EC2_NAME}}"
          exit 1
        fi

        PARAMS_FILE=$(mktemp)
        trap "rm -f $PARAMS_FILE" EXIT
        jq -Rs '{"commands": [.]}' < .taskfiles/ec2/scripts/status.sh > "$PARAMS_FILE"

        CMD_ID=$(aws ssm send-command \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --instance-ids "$INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --parameters "file://$PARAMS_FILE" \
          --query "Command.CommandId" --output text)

        for i in $(seq 1 15); do
          RESULT=$(aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" --output text 2>/dev/null) || true
          case "$RESULT" in
            Success|Failed|Cancelled|TimedOut) break ;;
          esac
          sleep 1
        done

        aws ssm get-command-invocation \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --command-id "$CMD_ID" \
          --instance-id "$INSTANCE_ID" \
          --query "StandardOutputContent" --output text

  logs:
    desc: "Tail ares logs on EC2 via SSM session (usage: task ec2:logs [EC2_NAME=ares-tools] [ROLE=orchestrator] [LINES=50])"
    silent: true
    vars:
      ROLE: '{{.ROLE | default "orchestrator"}}'
      LINES: '{{.LINES | default "50"}}'
    cmds:
      - |
        INSTANCE_ID=$(aws ec2 describe-instances \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --filters "Name=instance-state-name,Values=running" \
                    "Name=tag:Name,Values=*{{.EC2_NAME}}*" \
          --query "Reservations[*].Instances[*].InstanceId" \
          --output text | head -1)

        if [ -z "$INSTANCE_ID" ]; then
          echo -e "{{.ERROR}} No running instance found matching: {{.EC2_NAME}}"
          exit 1
        fi

        LOG_FILE="{{.ARES_LOG_DIR}}/{{.ROLE}}.log"
        echo -e "{{.INFO}} Tailing $LOG_FILE on $INSTANCE_ID (Ctrl+C to stop)..."

        aws ssm start-session \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --target "$INSTANCE_ID" \
          --document-name "AWS-StartInteractiveCommand" \
          --parameters "command=[\"tail -n {{.LINES}} -f $LOG_FILE\"]"

  # ============================================================================
  # Redis Port Forward
  # ============================================================================
  redis:forward:
    desc: "SSM port-forward Redis to localhost:16379 for local CLI access (usage: task ec2:redis:forward [EC2_NAME=ares-tools])"
    silent: true
    cmds:
      - |
        INSTANCE_ID=$(aws ec2 describe-instances \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --filters "Name=instance-state-name,Values=running" \
                    "Name=tag:Name,Values=*{{.EC2_NAME}}*" \
          --query "Reservations[*].Instances[*].InstanceId" \
          --output text | head -1)

        if [ -z "$INSTANCE_ID" ]; then
          echo -e "{{.ERROR}} No running instance found matching: {{.EC2_NAME}}"
          exit 1
        fi

        # Kill any stale port-forward
        lsof -ti:16379 | xargs kill 2>/dev/null || true
        sleep 1

        echo -e "{{.INFO}} Port-forwarding Redis: localhost:16379 -> $INSTANCE_ID:6379"
        echo -e "{{.INFO}} Use: ARES_REDIS_URL=redis://localhost:16379 ares ops loot --latest"
        echo -e "{{.INFO}} Press Ctrl+C to stop"
        echo ""

        aws ssm start-session \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --target "$INSTANCE_ID" \
          --document-name "AWS-StartPortForwardingSession" \
          --parameters '{"portNumber":["6379"],"localPortNumber":["16379"]}'

  # ============================================================================
  # CLI Operations (loot, runtime, report, list)
  # These use `ares --ec2` which handles instance resolution and SSM.
  # ============================================================================
  loot:
    desc: "Dump loot from EC2 via SSM (usage: task ec2:loot [EC2_NAME=ares-tools] [LATEST=true] [OPERATION_ID=op-xxx] [JSON=false] [DIFF=false])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      LATEST: '{{.LATEST | default "true"}}'
      JSON: '{{.JSON | default "false"}}'
      DIFF: '{{.DIFF | default "false"}}'
    cmd: >-
      ares --ec2 {{.EC2_NAME}} --ec2-profile {{.EC2_PROFILE}} --ec2-region {{.EC2_REGION}}
      ops loot
      {{if ne .OPERATION_ID ""}}{{.OPERATION_ID}}{{end}}
      {{if eq .LATEST "true"}}--latest{{end}}
      {{if eq .JSON "true"}}--json{{end}}
      {{if eq .DIFF "true"}}--diff{{end}}

  runtime:
    desc: "Show operation runtime from EC2 via SSM (usage: task ec2:runtime [EC2_NAME=ares-tools] [LATEST=true] [OPERATION_ID=op-xxx])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      LATEST: '{{.LATEST | default "true"}}'
    cmd: >-
      ares --ec2 {{.EC2_NAME}} --ec2-profile {{.EC2_PROFILE}} --ec2-region {{.EC2_REGION}}
      ops runtime
      {{if ne .OPERATION_ID ""}}{{.OPERATION_ID}}{{end}}
      {{if eq .LATEST "true"}}--latest{{end}}

  report:
    desc: "Generate and fetch report from EC2 (usage: task ec2:report [EC2_NAME=kali-ares] [LATEST=true] [OPERATION_ID=op-xxx] [REGENERATE=false])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      LATEST: '{{.LATEST | default "true"}}'
      REGENERATE: '{{.REGENERATE | default "false"}}'
      OUTPUT_DIR: '{{.OUTPUT_DIR | default "./reports"}}'
    cmds:
      - |
        INSTANCE_ID=$(aws ec2 describe-instances \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --filters "Name=instance-state-name,Values=running" \
                    "Name=tag:Name,Values=*{{.EC2_NAME}}*" \
          --query "Reservations[*].Instances[*].InstanceId" \
          --output text | head -1)

        if [ -z "$INSTANCE_ID" ]; then
          echo -e "{{.ERROR}} No running instance found matching: {{.EC2_NAME}}"
          exit 1
        fi

        run_ssm_cmd() {
          CMD_PAYLOAD="$1"
          TIMEOUT="${2:-120}"
          PARAMS_FILE=$(mktemp)
          jq -n --arg cmd "$CMD_PAYLOAD" '{"commands": [$cmd]}' > "$PARAMS_FILE"

          CMD_ID=$(aws ssm send-command \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "file://$PARAMS_FILE" \
            --timeout-seconds "$TIMEOUT" \
            --query "Command.CommandId" --output text)

          rm -f "$PARAMS_FILE"

          STATUS=""
          for i in $(seq 1 "$TIMEOUT"); do
            STATUS=$(aws ssm get-command-invocation \
              --profile "{{.EC2_PROFILE}}" \
              --region "{{.EC2_REGION}}" \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null) || true
            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut) break ;;
            esac
            sleep 1
          done

          OUTPUT=$(aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" --output text)

          if [ "$STATUS" != "Success" ]; then
            DETAILS=$(aws ssm get-command-invocation \
              --profile "{{.EC2_PROFILE}}" \
              --region "{{.EC2_REGION}}" \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StatusDetails" --output text 2>/dev/null)
            echo -e "{{.ERROR}} SSM command failed (status: $STATUS, details: $DETAILS)" >&2
            if [ "$DETAILS" = "Undeliverable" ]; then
              echo -e "{{.ERROR}} SSM could not deliver the command to $INSTANCE_ID (PingStatus likely ConnectionLost)." >&2
              echo -e "{{.ERROR}} Recovery: reboot the instance ('aws ec2 reboot-instances --instance-ids $INSTANCE_ID')." >&2
            fi
            if [ -n "$OUTPUT" ]; then
              echo "$OUTPUT" >&2
            fi
            aws ssm get-command-invocation \
              --profile "{{.EC2_PROFILE}}" \
              --region "{{.EC2_REGION}}" \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" --output text >&2
            return 1
          fi

          printf '%s' "$OUTPUT"
        }

        REPORT_ARGS=""
        {{if ne .OPERATION_ID ""}}REPORT_ARGS="$REPORT_ARGS {{.OPERATION_ID}}"{{end}}
        {{if eq .LATEST "true"}}REPORT_ARGS="$REPORT_ARGS --latest"{{end}}
        {{if eq .REGENERATE "true"}}REPORT_ARGS="$REPORT_ARGS --regenerate"{{end}}
        REPORT_CMD="set +e"
        REPORT_CMD="$REPORT_CMD; OUTPUT=\$(RUST_LOG=error ares ops report${REPORT_ARGS} --output-dir /tmp/reports 2>&1)"
        REPORT_CMD="$REPORT_CMD; RC=\$?; set -e; echo \"\$OUTPUT\"; if [ \$RC -ne 0 ]; then exit \$RC; fi"
        REPORT_CMD="$REPORT_CMD; REPORT_PATH=\$(printf '%s\n' \"\$OUTPUT\" | sed -n 's/^Report saved to \([^ ]*\.md\).*/\1/p' | tail -1)"
        REPORT_CMD="$REPORT_CMD; echo '===REPORT_META==='"
        REPORT_CMD="$REPORT_CMD; if [ -z \"\$REPORT_PATH\" ]; then echo 'ERROR: could not parse report path from ares output' >&2; exit 1; fi"
        REPORT_CMD="$REPORT_CMD; if [ ! -f \"\$REPORT_PATH\" ]; then echo \"ERROR: report file not found: \$REPORT_PATH\" >&2; exit 1; fi"
        REPORT_CMD="$REPORT_CMD; echo \"FILE:red/\$(basename \"\$REPORT_PATH\")\""
        REPORT_CMD="$REPORT_CMD; echo \"PATH:\$REPORT_PATH\""
        REPORT_CMD="$REPORT_CMD; echo \"BYTES:\$(wc -c < \"\$REPORT_PATH\" | tr -d ' ')\""
        REPORT_CMD="$REPORT_CMD; echo \"SHA256:\$(sha256sum \"\$REPORT_PATH\" | awk '{print \$1}')\""

        echo -e "{{.INFO}} Generating report on EC2..."

        OUTPUT=$(run_ssm_cmd "$REPORT_CMD" 120)
        BEFORE_MARKER=$(echo "$OUTPUT" | sed '/===REPORT_META===/,$d')
        META=$(echo "$OUTPUT" | sed -n '/===REPORT_META===/,$p' | tail -n +2)

        echo "$BEFORE_MARKER"

        FILENAME=$(echo "$META" | sed -n 's/^FILE://p' | head -1)
        REMOTE_PATH=$(echo "$META" | sed -n 's/^PATH://p' | head -1)
        REMOTE_BYTES=$(echo "$META" | sed -n 's/^BYTES://p' | head -1)
        REMOTE_SHA=$(echo "$META" | sed -n 's/^SHA256://p' | head -1)

        if [ -z "$FILENAME" ] || [ -z "$REMOTE_PATH" ] || [ -z "$REMOTE_BYTES" ] || [ -z "$REMOTE_SHA" ]; then
          echo -e "{{.ERROR}} Could not parse report metadata from EC2 output" >&2
          exit 1
        fi

        mkdir -p "{{.OUTPUT_DIR}}/red"
        OUTFILE="{{.OUTPUT_DIR}}/$FILENAME"
        TMP_OUT="${OUTFILE}.tmp.$$"
        : > "$TMP_OUT"
        trap "rm -f '$TMP_OUT'" EXIT

        CHUNK_SIZE=12000
        CHUNKS=$(( (REMOTE_BYTES + CHUNK_SIZE - 1) / CHUNK_SIZE ))
        echo -e "{{.INFO}} Fetching $REMOTE_BYTES bytes from EC2 in $CHUNKS chunks..."

        CHUNK=0
        while [ $CHUNK -lt $CHUNKS ]; do
          CHUNK_CMD="dd if=\"$REMOTE_PATH\" bs=$CHUNK_SIZE skip=$CHUNK count=1 status=none | base64 | tr -d '\n'"
          CHUNK_B64=$(run_ssm_cmd "$CHUNK_CMD" 30)
          if ! printf '%s' "$CHUNK_B64" | base64 -d >> "$TMP_OUT"; then
            echo -e "{{.ERROR}} Failed to decode report chunk $((CHUNK + 1))/$CHUNKS" >&2
            exit 1
          fi
          CHUNK=$((CHUNK + 1))
        done

        LOCAL_BYTES=$(wc -c < "$TMP_OUT" | tr -d ' ')
        if [ "$LOCAL_BYTES" != "$REMOTE_BYTES" ]; then
          echo -e "{{.ERROR}} Report size mismatch: remote=$REMOTE_BYTES local=$LOCAL_BYTES" >&2
          exit 1
        fi

        if command -v sha256sum >/dev/null 2>&1; then
          LOCAL_SHA=$(sha256sum "$TMP_OUT" | awk '{print $1}')
        else
          LOCAL_SHA=$(shasum -a 256 "$TMP_OUT" | awk '{print $1}')
        fi
        if [ "$LOCAL_SHA" != "$REMOTE_SHA" ]; then
          echo -e "{{.ERROR}} Report checksum mismatch: remote=$REMOTE_SHA local=$LOCAL_SHA" >&2
          exit 1
        fi

        mv "$TMP_OUT" "$OUTFILE"
        echo -e "{{.SUCCESS}} Report saved: $OUTFILE"

  ops:
    desc: "List all operations on EC2 (usage: task ec2:ops [EC2_NAME=ares-tools] [LATEST=true])"
    silent: true
    vars:
      LATEST: '{{.LATEST | default "false"}}'
    cmd: >-
      ares --ec2 {{.EC2_NAME}} --ec2-profile {{.EC2_PROFILE}} --ec2-region {{.EC2_REGION}}
      ops list
      {{if eq .LATEST "true"}}--latest{{end}}

  # ============================================================================
  # Watch + auto-report
  # ============================================================================
  watch:
    desc: "Poll EC2 operation until complete, then auto-fetch the report locally (usage: task ec2:watch [EC2_NAME=kali-ares] [LATEST=true] [OPERATION_ID=op-xxx] [POLL_INTERVAL=30] [MAX_WAIT=7200] [OUTPUT_DIR=./reports])"
    silent: true
    vars:
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      LATEST: '{{.LATEST | default "true"}}'
      POLL_INTERVAL: '{{.POLL_INTERVAL | default "30"}}'
      MAX_WAIT: '{{.MAX_WAIT | default "7200"}}'
      OUTPUT_DIR: '{{.OUTPUT_DIR | default "./reports"}}'
    cmds:
      - |
        if [ -z "{{.OPERATION_ID}}" ] && [ "{{.LATEST}}" != "true" ]; then
          echo -e "{{.ERROR}} Either OPERATION_ID or LATEST=true is required"
          exit 1
        fi

        OP_ARG=""
        LATEST_FLAG=""
        if [ -n "{{.OPERATION_ID}}" ]; then
          OP_ARG="{{.OPERATION_ID}}"
        else
          LATEST_FLAG="--latest"
        fi

        START=$(date +%s)
        echo -e "{{.INFO}} Watching EC2 operation (poll={{.POLL_INTERVAL}}s, max_wait={{.MAX_WAIT}}s)"
        echo -e "{{.INFO}} Will fetch report to {{.OUTPUT_DIR}}/red/ when the op reaches a terminal state"

        RESOLVED_OP=""
        while true; do
          ELAPSED=$(( $(date +%s) - START ))
          if [ $ELAPSED -gt {{.MAX_WAIT}} ]; then
            echo -e "{{.ERROR}} Max wait ({{.MAX_WAIT}}s) exceeded, giving up"
            exit 1
          fi

          STATUS_OUT=$(ares --ec2 {{.EC2_NAME}} --ec2-profile {{.EC2_PROFILE}} --ec2-region {{.EC2_REGION}} \
            ops status $OP_ARG $LATEST_FLAG 2>&1 || true)

          STATUS=$(echo "$STATUS_OUT" | grep -E '^Status: ' | head -1 | awk '{print $2}')
          OP_ID=$(echo "$STATUS_OUT" | grep -E '^Operation: ' | head -1 | awk '{print $2}')
          if [ -n "$OP_ID" ]; then
            RESOLVED_OP="$OP_ID"
          fi

          if [ -z "$STATUS" ]; then
            echo -e "{{.WARN}} [${ELAPSED}s] no status yet (waiting for op to register)"
          else
            echo -e "{{.INFO}} [${ELAPSED}s] op=${RESOLVED_OP:-?} status=$STATUS"
            case "$STATUS" in
              completed|stopped)
                echo -e "{{.SUCCESS}} Operation reached terminal state: $STATUS"
                break
                ;;
            esac
          fi

          sleep {{.POLL_INTERVAL}}
        done

        if [ -z "$RESOLVED_OP" ]; then
          echo -e "{{.ERROR}} Could not resolve operation ID — cannot fetch report"
          exit 1
        fi

        echo -e "{{.INFO}} Fetching report for $RESOLVED_OP..."
        task ec2:report EC2_NAME={{.EC2_NAME}} OPERATION_ID=$RESOLVED_OP OUTPUT_DIR={{.OUTPUT_DIR}}

  # ============================================================================
  # Operation Launch
  # ============================================================================
  launch:
    desc: "Launch orchestrator on EC2 via Secrets Manager (usage: task ec2:launch EC2_NAME=kali-ares [DOMAIN=...] [TARGETS=...] [CRED_USER=...] [CRED_PASS=...] [WAIT=true] [POLL_INTERVAL=30])"
    silent: true
    vars:
      DOMAIN: '{{.DOMAIN | default "sevenkingdoms.local"}}'
      TARGETS: '{{.TARGETS | default "10.1.2.150,10.1.2.220,10.1.2.58,10.1.2.254,10.1.2.51"}}'
      CRED_USER: '{{.CRED_USER | default "samwell.tarly"}}'
      CRED_PASS: '{{.CRED_PASS | default "Heartsbane"}}'
      CRED_DOMAIN: '{{.CRED_DOMAIN | default "north.sevenkingdoms.local"}}'
      SECRETS_ID: '{{.SECRETS_ID | default "ares/api-keys"}}'
      LLM_MODEL: '{{.LLM_MODEL | default ""}}'
      FLUSH_REDIS: '{{.FLUSH_REDIS | default "true"}}'
      OPERATION_ID: '{{.OPERATION_ID | default ""}}'
      WAIT: '{{.WAIT | default "true"}}'
      POLL_INTERVAL: '{{.POLL_INTERVAL | default "30"}}'
      MAX_WAIT: '{{.MAX_WAIT | default "7200"}}'
      OUTPUT_DIR: '{{.OUTPUT_DIR | default "./reports"}}'
    cmds:
      - |
        INSTANCE_ID=$(aws ec2 describe-instances \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --filters "Name=instance-state-name,Values=running" \
                    "Name=tag:Name,Values=*{{.EC2_NAME}}*" \
          --query "Reservations[*].Instances[*].InstanceId" \
          --output text | head -1)

        if [ -z "$INSTANCE_ID" ]; then
          echo -e "{{.ERROR}} No running instance found matching: {{.EC2_NAME}}"
          exit 1
        fi

        if [ -n "{{.OPERATION_ID}}" ]; then
          OP_ID="{{.OPERATION_ID}}"
        else
          OP_ID="op-$(date -u +%Y%m%d-%H%M%S)"
        fi
        echo -e "{{.INFO}} Operation ID: $OP_ID"

        # Build target IPs JSON array
        TARGET_ARRAY=$(echo '{{.TARGETS}}' | tr ',' '\n' | jq -R . | jq -sc .)

        PAYLOAD=$(jq -c -n \
          --arg op_id "$OP_ID" \
          --arg domain "{{.DOMAIN}}" \
          --argjson targets "$TARGET_ARRAY" \
          --arg user "{{.CRED_USER}}" \
          --arg pass "{{.CRED_PASS}}" \
          --arg cred_domain "{{.CRED_DOMAIN}}" \
          '{
            "operation_id": $op_id,
            "target_domain": $domain,
            "target_ips": $targets,
            "initial_credential": { "username": $user, "password": $pass, "domain": $cred_domain }
          }')

        # Fetch API keys from Secrets Manager
        SECRETS=$(aws secretsmanager get-secret-value \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --secret-id "{{.SECRETS_ID}}" \
          --query SecretString --output text 2>/dev/null) || true

        if [ -z "$SECRETS" ]; then
          echo -e "{{.ERROR}} Failed to fetch API keys from Secrets Manager ({{.SECRETS_ID}})"
          echo -e "{{.INFO}} Create with: aws secretsmanager create-secret --name ares/api-keys --secret-string '{\"OPENAI_API_KEY\":\"...\",\"ANTHROPIC_API_KEY\":\"...\"}'"
          exit 1
        fi

        OPENAI_KEY=$(echo "$SECRETS" | jq -r .OPENAI_API_KEY)
        ANTHROPIC_KEY=$(echo "$SECRETS" | jq -r .ANTHROPIC_API_KEY)
        GRAFANA_URL_VAL=$(echo "$SECRETS" | jq -r '.GRAFANA_URL // empty')
        GRAFANA_TOKEN_VAL=$(echo "$SECRETS" | jq -r '.GRAFANA_SERVICE_ACCOUNT_TOKEN // empty')
        LOKI_URL_VAL=$(echo "$SECRETS" | jq -r '.LOKI_URL // empty')
        if [ -z "$LOKI_URL_VAL" ]; then
          LOKI_URL_VAL="{{.LOKI_URL}}"
        fi
        DREADNODE_API_KEY=$(echo "$SECRETS" | jq -r '.DREADNODE_API_KEY // empty')
        OTEL_TRACES_ENDPOINT="{{.OTEL_TRACES_ENDPOINT}}"

        FLUSH_CMD=""
        if [ "{{.FLUSH_REDIS}}" = "true" ]; then
          FLUSH_CMD="redis-cli FLUSHDB; echo Redis flushed;"
        fi

        # Write shared env vars for workers (EnvironmentFile in systemd template)
        ENV_FILE_CMD="mkdir -p /etc/ares"
        ENV_FILE_CMD="$ENV_FILE_CMD; echo 'OPENAI_API_KEY=${OPENAI_KEY}' > /etc/ares/env"
        if [ -n "$GRAFANA_URL_VAL" ]; then
          ENV_FILE_CMD="$ENV_FILE_CMD; echo 'GRAFANA_URL=${GRAFANA_URL_VAL}' >> /etc/ares/env"
          if [ -n "$GRAFANA_TOKEN_VAL" ]; then
            ENV_FILE_CMD="$ENV_FILE_CMD; echo 'GRAFANA_SERVICE_ACCOUNT_TOKEN=${GRAFANA_TOKEN_VAL}' >> /etc/ares/env"
          fi
        fi
        if [ -n "$LOKI_URL_VAL" ]; then
          ENV_FILE_CMD="$ENV_FILE_CMD; echo 'LOKI_URL=${LOKI_URL_VAL}' >> /etc/ares/env"
        fi
        ENV_FILE_CMD="$ENV_FILE_CMD; echo 'ARES_DEPLOYMENT={{.EC2_DEPLOYMENT}}' >> /etc/ares/env"
        ENV_FILE_CMD="$ENV_FILE_CMD; echo 'NATS_URL=nats://127.0.0.1:4222' >> /etc/ares/env"
        # OTEL: send traces to Alloy OTLP gateway → Tempo via HTTP/protobuf
        ENV_FILE_CMD="$ENV_FILE_CMD; echo 'OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=${OTEL_TRACES_ENDPOINT}' >> /etc/ares/env"
        ENV_FILE_CMD="$ENV_FILE_CMD; echo 'OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf' >> /etc/ares/env"
        ENV_FILE_CMD="$ENV_FILE_CMD; echo 'OTEL_RESOURCE_ATTRIBUTES=deployment.environment=staging,attack.team=red' >> /etc/ares/env"
        ENV_FILE_CMD="$ENV_FILE_CMD; chmod 600 /etc/ares/env; echo Wrote /etc/ares/env"
        # Restart workers so they pick up the new env file
        ENV_FILE_CMD="$ENV_FILE_CMD; for role in recon credential_access cracker acl privesc lateral coercion; do systemctl restart ares@\${role} 2>/dev/null || true; done; echo Workers restarted"

        LAUNCH_SCRIPT="#!/bin/bash
        set -e
        ${ENV_FILE_CMD}
        ${FLUSH_CMD}
        pkill -f 'ares orchestrator' 2>/dev/null || true; sleep 1
        export OPENAI_API_KEY='${OPENAI_KEY}'
        export ANTHROPIC_API_KEY='${ANTHROPIC_KEY}'
        export GRAFANA_URL='${GRAFANA_URL_VAL}'
        export GRAFANA_SERVICE_ACCOUNT_TOKEN='${GRAFANA_TOKEN_VAL}'
        export LOKI_URL='${LOKI_URL_VAL}'
        export ARES_REDIS_URL=redis://127.0.0.1:6379
        export NATS_URL=nats://127.0.0.1:4222
        {{- if .LLM_MODEL}}
        export ARES_LLM_MODEL='{{.LLM_MODEL}}'
        {{- end}}
        export RUST_LOG=info
        export ARES_CONFIG={{.ARES_REMOTE_CONFIG}}
        export ARES_TOOL_DISPATCH=local
        export ARES_BLUE_ENABLED=1
        export ARES_DEPLOYMENT='{{.EC2_DEPLOYMENT}}'
        export OTEL_EXPORTER_OTLP_TRACES_ENDPOINT='${OTEL_TRACES_ENDPOINT}'
        export OTEL_EXPORTER_OTLP_PROTOCOL='http/protobuf'
        export OTEL_RESOURCE_ATTRIBUTES='deployment.environment=staging,attack.team=red'
        export ARES_OPERATION_ID='${PAYLOAD}'
        mkdir -p {{.ARES_LOG_DIR}}
        nohup /usr/local/bin/ares orchestrator >{{.ARES_LOG_DIR}}/orchestrator.log 2>&1 &
        sleep 2
        if pgrep -f 'ares orchestrator' >/dev/null; then
          echo Orchestrator started for ${OP_ID}
          head -5 {{.ARES_LOG_DIR}}/orchestrator.log
        else
          echo FAILED TO START
          cat {{.ARES_LOG_DIR}}/orchestrator.log | head -20; exit 1
        fi"

        B64=$(echo "$LAUNCH_SCRIPT" | base64)
        PARAMS_FILE=$(mktemp)
        trap "rm -f $PARAMS_FILE" EXIT
        jq -n --arg b64 "$B64" '{"commands": ["echo " + $b64 + " | base64 -d | /bin/bash"]}' > "$PARAMS_FILE"

        echo -e "{{.INFO}} Launching orchestrator on $INSTANCE_ID..."

        CMD_ID=$(aws ssm send-command \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --instance-ids "$INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --parameters "file://$PARAMS_FILE" \
          --query "Command.CommandId" --output text)

        for i in $(seq 1 30); do
          STATUS=$(aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" --output text 2>/dev/null) || true
          case "$STATUS" in Success|Failed|Cancelled|TimedOut) break ;; esac
          sleep 1
        done

        aws ssm get-command-invocation \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --command-id "$CMD_ID" \
          --instance-id "$INSTANCE_ID" \
          --query "StandardOutputContent" --output text

        if [ "$STATUS" != "Success" ]; then
          DETAILS=$(aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StatusDetails" --output text 2>/dev/null)
          echo -e "{{.ERROR}} Launch failed (status: $STATUS, details: $DETAILS)" >&2
          if [ "$DETAILS" = "Undeliverable" ]; then
            echo -e "{{.ERROR}} SSM could not deliver the command to $INSTANCE_ID (PingStatus likely ConnectionLost)." >&2
            echo -e "{{.ERROR}} Recovery: reboot the instance ('aws ec2 reboot-instances --instance-ids $INSTANCE_ID')." >&2
          fi
          aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardErrorContent" --output text >&2
          exit 1
        fi

        echo -e "{{.SUCCESS}} Operation $OP_ID launched"
        echo -e "{{.INFO}} Monitor: task ec2:runtime EC2_NAME={{.EC2_NAME}}"

        if [ "{{.WAIT}}" = "true" ]; then
          echo -e "{{.INFO}} WAIT=true — handing off to ec2:watch (auto-fetch report on completion)"
          task ec2:watch \
            EC2_NAME={{.EC2_NAME}} \
            OPERATION_ID="$OP_ID" \
            POLL_INTERVAL={{.POLL_INTERVAL}} \
            MAX_WAIT={{.MAX_WAIT}} \
            OUTPUT_DIR={{.OUTPUT_DIR}}
        fi

  # ============================================================================
  # Post-AMI Tool Setup
  # ============================================================================
  setup:tools:
    desc: "Install pentest tools on EC2 via pipx (usage: task ec2:setup:tools EC2_NAME=kali-ares)"
    silent: true
    cmds:
      - |
        INSTANCE_ID=$(aws ec2 describe-instances \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --filters "Name=instance-state-name,Values=running" \
                    "Name=tag:Name,Values=*{{.EC2_NAME}}*" \
          --query "Reservations[*].Instances[*].InstanceId" \
          --output text | head -1)

        if [ -z "$INSTANCE_ID" ]; then
          echo -e "{{.ERROR}} No running instance found matching: {{.EC2_NAME}}"
          exit 1
        fi

        read -r -d '' SCRIPT << 'TOOLEOF' || true
        #!/bin/bash
        set -e
        export DEBIAN_FRONTEND=noninteractive
        export PATH="/root/.local/bin:/usr/local/bin:$PATH"

        echo "=== Installing system deps ==="
        apt-get update -qq
        apt-get install -y -qq nmap smbclient samba-common-bin ldap-utils dnsutils whois python3-pip python3-venv pipx git jq unzip hashcat

        echo "=== Installing tools via pipx ==="
        pipx ensurepath
        pipx install impacket 2>&1 | tail -3
        pipx install git+https://github.com/Pennyw0rth/NetExec.git 2>&1 | tail -3
        pipx install bloodhound 2>&1 | tail -3
        pipx install certipy-ad 2>&1 | tail -3
        pipx install lsassy 2>&1 | tail -3

        echo "=== Installing evil-winrm ==="
        apt-get install -y -qq ruby ruby-dev build-essential 2>/dev/null
        gem install evil-winrm --no-document 2>&1 | tail -3 || echo "evil-winrm install failed (non-fatal)"

        echo "=== Creating impacket wrappers ==="
        for s in secretsdump GetNPUsers GetUserSPNs psexec wmiexec smbexec getTGT getST ticketer lookupsid findDelegation addcomputer rbcd dacledit raiseChild ntlmrelayx mssqlclient; do
          printf '#!/bin/bash\nexec /root/.local/share/pipx/venvs/impacket/bin/%s.py "$@"\n' "$s" > "/usr/local/bin/impacket-${s}"
          chmod +x "/usr/local/bin/impacket-${s}"
        done

        echo "=== Creating symlinks ==="
        for cmd in netexec nxc bloodhound-python certipy lsassy; do
          SRC="/root/.local/bin/$cmd"
          [ -f "$SRC" ] && ln -sf "$SRC" "/usr/local/bin/$cmd"
        done

        echo "=== Installing wordlists ==="
        mkdir -p /usr/share/wordlists
        if [ ! -f /usr/share/wordlists/rockyou.txt ]; then
          curl -sL https://github.com/brannondorsey/naive-hashcat/releases/download/data/rockyou.txt -o /usr/share/wordlists/rockyou.txt
          echo "rockyou.txt: $(wc -l < /usr/share/wordlists/rockyou.txt) entries"
        else
          echo "rockyou.txt already present"
        fi

        echo "=== Fixing worker PATH ==="
        if ! grep -q "^Environment=PATH=" /etc/systemd/system/ares@.service 2>/dev/null; then
          sed -i '/\[Service\]/a Environment=PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/root/.local/bin' /etc/systemd/system/ares@.service
          systemctl daemon-reload
        fi

        echo "=== Restarting workers ==="
        for role in recon credential_access cracker acl privesc lateral coercion; do
          systemctl restart ares@$role 2>/dev/null || true
        done

        echo "=== Verifying ==="
        for cmd in nmap netexec impacket-secretsdump impacket-GetNPUsers smbclient rpcclient ldapsearch lsassy evil-winrm; do
          printf "%-30s %s\n" "$cmd:" "$(which $cmd 2>/dev/null || echo NOT_FOUND)"
        done
        echo "=== Done ==="
        TOOLEOF

        B64=$(echo "$SCRIPT" | base64)
        PARAMS_FILE=$(mktemp)
        trap "rm -f $PARAMS_FILE" EXIT
        jq -n --arg b64 "$B64" '{"commands": ["echo " + $b64 + " | base64 -d | /bin/bash"], "executionTimeout": ["600"]}' > "$PARAMS_FILE"

        echo -e "{{.INFO}} Installing pentest tools on $INSTANCE_ID (2-3 minutes)..."

        CMD_ID=$(aws ssm send-command \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --instance-ids "$INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --parameters "file://$PARAMS_FILE" \
          --query "Command.CommandId" --output text)

        for i in $(seq 1 180); do
          STATUS=$(aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" --output text 2>/dev/null) || true
          case "$STATUS" in Success|Failed|Cancelled|TimedOut) break ;; esac
          sleep 2
        done

        aws ssm get-command-invocation \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --command-id "$CMD_ID" \
          --instance-id "$INSTANCE_ID" \
          --query "StandardOutputContent" --output text

        if [ "$STATUS" = "Success" ]; then
          echo -e "{{.SUCCESS}} Tools installed on $INSTANCE_ID"
        else
          DETAILS=$(aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StatusDetails" --output text 2>/dev/null)
          echo -e "{{.ERROR}} Tool installation failed (status: $STATUS, details: $DETAILS)"
          if [ "$DETAILS" = "Undeliverable" ]; then
            echo -e "{{.ERROR}} SSM could not deliver the command to $INSTANCE_ID (PingStatus likely ConnectionLost)."
            echo -e "{{.ERROR}} Recovery: reboot the instance ('aws ec2 reboot-instances --instance-ids $INSTANCE_ID')."
          fi
          aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardErrorContent" --output text >&2
          exit 1
        fi

  # ============================================================================
  # Arbitrary Command Execution
  # ============================================================================
  exec:
    desc: "Run a command on EC2 via SSM (usage: task ec2:exec EC2_NAME=ares-tools CMD='redis-cli info')"
    silent: true
    vars:
      CMD: '{{.CMD | default ""}}'
    preconditions:
      - sh: test -n "{{.CMD}}"
        msg: "CMD required. Usage: task ec2:exec CMD='redis-cli info keyspace'"
    cmds:
      - |
        INSTANCE_ID=$(aws ec2 describe-instances \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --filters "Name=instance-state-name,Values=running" \
                    "Name=tag:Name,Values=*{{.EC2_NAME}}*" \
          --query "Reservations[*].Instances[*].InstanceId" \
          --output text | head -1)

        if [ -z "$INSTANCE_ID" ]; then
          echo -e "{{.ERROR}} No running instance found matching: {{.EC2_NAME}}"
          exit 1
        fi

        PARAMS_FILE=$(mktemp)
        trap "rm -f $PARAMS_FILE" EXIT
        jq -n --arg cmd "{{.CMD}}" '{"commands": [$cmd]}' > "$PARAMS_FILE"

        CMD_ID=$(aws ssm send-command \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --instance-ids "$INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --parameters "file://$PARAMS_FILE" \
          --query "Command.CommandId" --output text)

        for i in $(seq 1 60); do
          STATUS=$(aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" --output text 2>/dev/null) || true
          case "$STATUS" in
            Success|Failed|Cancelled|TimedOut) break ;;
          esac
          sleep 1
        done

        aws ssm get-command-invocation \
          --profile "{{.EC2_PROFILE}}" \
          --region "{{.EC2_REGION}}" \
          --command-id "$CMD_ID" \
          --instance-id "$INSTANCE_ID" \
          --query "StandardOutputContent" --output text

        if [ "$STATUS" != "Success" ]; then
          DETAILS=$(aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StatusDetails" --output text 2>/dev/null)
          echo -e "{{.ERROR}} exec failed (status: $STATUS, details: $DETAILS)" >&2
          if [ "$DETAILS" = "Undeliverable" ]; then
            echo -e "{{.ERROR}} SSM could not deliver the command to $INSTANCE_ID (PingStatus likely ConnectionLost)." >&2
            echo -e "{{.ERROR}} Recovery: reboot the instance ('aws ec2 reboot-instances --instance-ids $INSTANCE_ID')." >&2
          fi
          aws ssm get-command-invocation \
            --profile "{{.EC2_PROFILE}}" \
            --region "{{.EC2_REGION}}" \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardErrorContent" --output text >&2
          exit 1
        fi
