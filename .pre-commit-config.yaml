---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=10240]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-json
      - id: check-symlinks
      - id: check-yaml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        entry: yamllint --strict -c .hooks/linters/yamllint.yaml

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        entry: codespell -q 3 -f --skip=".git,.github,README.md,target,Cargo.lock" --ignore-words-list="astroid,braket,unstall,infinit,sems,te"

  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 3.0.0
    hooks:
      - id: script-must-have-extension
        name: Ensure shell scripts end with .sh
        types: [shell]
        exclude: '\.tmpl$'
      - id: shellcheck
        exclude: '\.tmpl$'
      - id: shfmt
        exclude: '\.tmpl$'

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: ['--fix', '--config', '.hooks/linters/markdownlint.json']

  - repo: https://github.com/ansible/ansible-lint
    rev: v26.4.0
    hooks:
      - id: ansible-lint
        # env -u GIT_INDEX_FILE prevents ansible-galaxy (called internally by
        # ansible-lint) from inheriting the commit-time index file and
        # corrupting it with stale blob references.
        entry: env -u GIT_INDEX_FILE ansible-lint -v --force-color -c .hooks/ansible/ansible-lint.yaml
        language: python
        always_run: true
        additional_dependencies: [".[community]"]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        pass_filenames: false

  # Rust checks
  - repo: local
    hooks:
      - id: cargo-fmt
        name: Rust format check
        entry: cargo fmt --all
        language: system
        files: '\.rs$'
        pass_filenames: false

      - id: cargo-clippy
        name: Rust clippy lint
        entry: cargo clippy --all-targets -- -D warnings
        language: system
        files: '\.rs$'
        pass_filenames: false

      - id: cargo-check
        name: Rust compile check
        entry: cargo check --all-targets
        language: system
        files: '\.rs$'
        pass_filenames: false

      - id: cargo-test
        name: Rust tests
        entry: cargo test
        language: system
        files: '\.rs$'
        pass_filenames: false

      - id: prettier
        name: Run prettier
        entry: .hooks/prettier.sh
        language: script
        types: [json, yaml]

      - id: docsible
        name: Generate Ansible documentation with docsible
        entry: .hooks/ansible/docsible-hook.sh
        language: script
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

      - id: update-architecture-diagram
        name: Update Architecture Diagram
        entry: python .hooks/ansible/gen-arch-diagram.py
        language: python
        pass_filenames: false
        always_run: false
        files: ^ansible/(roles/|plugins/|playbooks/).*
