---
# GOAD Attack Box Provisioning Playbook
# Deploys all tools needed for GOAD (Game of Active Directory) exploitation
#
# This playbook includes comprehensive tooling for:
# - Initial reconnaissance and enumeration
# - Credential discovery and cracking
# - Network poisoning and relay attacks
# - Kerberos attacks (AS-REP roasting, Kerberoasting)
# - ADCS attacks (ESC1-15, Certifried)
# - ACL abuse and permission exploitation
# - Delegation attacks (Unconstrained, Constrained, RBCD)
# - MSSQL exploitation
# - Privilege escalation
# - Lateral movement
# - Domain trust exploitation
#
# Usage:
#   ansible-playbook goad_attack_box.yml -i inventory.yml
#
# For SSM deployment:
#   ansible-playbook goad_attack_box.yml -i aws_ec2.yml --limit "tag_Name_*kali*"

- name: Provision GOAD Attack Box
  hosts: all
  gather_facts: true
  become: true

  vars:
    # Environment configuration
    alloy_env: "{{ lookup('env', 'ENVIRONMENT') | default('goad', true) }}"
    alloy_deployment_name: "goad-attack-box"
    alloy_server_id: ""
    alloy_instance_id: ""
    alloy_loki_endpoint: "{{ alloy_loki_endpoint }}"
    alloy_version: "1.10.1"

    # Python version
    base_python_version: "3.13.7"

    # Cracking tools configuration - full wordlists for GOAD
    cracking_tools_install_hashcat: true
    cracking_tools_install_john: true
    cracking_tools_install_seclists: true
    cracking_tools_gpu_support: true
    cracking_tools_hashcat_from_source: true
    cracking_tools_nvidia_opencl_icd: true
    cracking_tools_wordlists:
      - rockyou
      - seclists_passwords

    # Enable all poisoning tools for GOAD
    coercion_tools_install_responder: true
    coercion_tools_install_mitm6: true
    coercion_tools_install_coercer: true
    coercion_tools_install_petitpotam: true
    coercion_tools_install_krbrelayx: true

    # Enable all network/AD tools for GOAD
    recon_tools_install_bloodhound: true
    recon_tools_install_certipy: true
    recon_tools_install_adidnsdump: true

    # Enable credential access tools for GOAD
    credential_access_tools_install_sprayhound: true
    credential_access_tools_install_targetedkerberoast: true

    # Enable all lateral movement tools
    lateral_movement_tools_install_evil_winrm: true
    credential_access_tools_install_lsassy: true
    lateral_movement_tools_install_xfreerdp: true
    lateral_movement_tools_install_sshpass: true

    # Enable all ACL tools for GOAD
    acl_tools_install_bloodyad: true
    acl_tools_install_pywhisker: true

    # Enable all privilege escalation tools for GOAD
    privesc_tools_install_printspoofer: true
    privesc_tools_install_godpotato: true
    privesc_tools_install_sweetpotato: true
    privesc_tools_install_krbrelayup: true
    privesc_tools_install_sharpgpoabuse: true
    privesc_tools_install_winpeas: true
    privesc_tools_install_linpeas: true
    privesc_tools_install_nopac: true
    privesc_tools_install_printnightmare: true
    privesc_tools_install_runascs: true
    privesc_tools_install_powerupsql: true

  pre_tasks:
    # Disable Transparent Huge Pages. Default Kali setting (`always`) caused
    # khugepaged to lock up under heavy fork/exec from impacket/nxc workloads,
    # producing RCU stalls and unrecoverable instance freezes that took SSM
    # down with them. Bake the kernel cmdline into the AMI and turn it off
    # for the rest of this run so the build itself isn't at risk.
    - name: Disable THP via kernel cmdline (persists across reboot)
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
        line: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet transparent_hugepage=never"'
      notify: Update grub

    - name: Disable THP at runtime so the bake itself is safe
      ansible.builtin.shell: |
        echo never > /sys/kernel/mm/transparent_hugepage/enabled
        echo never > /sys/kernel/mm/transparent_hugepage/defrag
      changed_when: false

  handlers:
    - name: Update grub
      ansible.builtin.command: update-grub
      changed_when: true

  roles:
    # AWS infrastructure agents
    - role: dreadnode.nimbus_range.aws_ssm_agent
    - role: dreadnode.nimbus_range.aws_cloudwatch_agent

    # Base Ares requirements
    - role: dreadnode.nimbus_range.base
      vars:
        base_install_uv: true
        base_verify_install: true

    # Network reconnaissance tools (nmap, netexec, impacket, bloodhound, certipy, etc.)
    - role: dreadnode.nimbus_range.recon_tools
      vars:
        recon_tools_verify_install: true

    # Credential access tools (GetNPUsers, secretsdump, lsassy, sprayhound)
    - role: dreadnode.nimbus_range.credential_access_tools
      vars:
        credential_access_tools_verify_install: true

    # Network poisoning and relay tools (Responder, mitm6, Coercer, PetitPotam)
    - role: dreadnode.nimbus_range.coercion_tools
      vars:
        coercion_tools_verify_install: true

    # Lateral movement tools (evil-winrm, xfreerdp, smbclient, impacket)
    - role: dreadnode.nimbus_range.lateral_movement_tools
      vars:
        lateral_movement_tools_verify_install: true

    # ACL exploitation tools (bloodyAD, pywhisker)
    - role: dreadnode.nimbus_range.acl_tools
      vars:
        acl_tools_verify_install: true

    # Password cracking tools (hashcat, john, wordlists)
    - role: dreadnode.nimbus_range.cracking_tools
      vars:
        cracking_tools_verify_install: true

    # Privilege escalation tools (PrintSpoofer, noPac, PrintNightmare, etc.)
    - role: dreadnode.nimbus_range.privesc_tools
      vars:
        privesc_tools_verify_install: true

    # Redis server for Ares durable state store
    - role: dreadnode.nimbus_range.redis
      vars:
        redis_verify_install: true

    # NATS JetStream server for Ares task + RPC broker
    - role: dreadnode.nimbus_range.nats
      vars:
        nats_verify_install: true

    # Grafana Alloy for log shipping to Loki
    - name: Install and configure Grafana Alloy
      role: grafana.grafana.alloy
      become: true
      vars:
        alloy_config: |
          // Enable debug logging to help troubleshoot
          logging {
            level  = "debug"
            format = "logfmt"
          }

          // Read system logs
          loki.source.file "syslog" {
            targets = [
              {__path__ = "/var/log/syslog", job = "syslog"},
              {__path__ = "/var/log/auth.log", job = "auth"},
              {__path__ = "/var/log/user-data.log", job = "user-data"},
            ]
            forward_to = [loki.process.linux.receiver]
          }

          // Read shell history for attack activity tracking
          loki.source.file "shell_history" {
            targets = [
              {__path__ = "/home/kali/.zsh_history", job = "zsh_history", user = "kali"},
              {__path__ = "/root/.zsh_history", job = "zsh_history", user = "root"},
              {__path__ = "/home/kali/.bash_history", job = "bash_history", user = "kali"},
              {__path__ = "/root/.bash_history", job = "bash_history", user = "root"},
            ]
            forward_to = [loki.process.attack_tools.receiver]
          }

          // Process attack tool logs separately for better filtering
          loki.process "attack_tools" {
            // Add static labels
            stage.static_labels {
              values = {
                environment  = "{{ alloy_env }}",
                deployment   = "{{ alloy_deployment_name }}",
                server       = "{{ alloy_server_id }}",
                instance_id  = "{{ ansible_ec2_instance_id | default(alloy_instance_id) }}",
                host         = constants.hostname,
                os           = "linux",
                log_type     = "attack_activity",
              }
            }
            forward_to = [loki.write.remote.receiver]
          }

          // Process Linux system logs
          loki.process "linux" {
            // Add static labels
            stage.static_labels {
              values = {
                environment  = "{{ alloy_env }}",
                deployment   = "{{ alloy_deployment_name }}",
                server       = "{{ alloy_server_id }}",
                instance_id  = "{{ ansible_ec2_instance_id | default(alloy_instance_id) }}",
                host         = constants.hostname,
                os           = "linux",
              }
            }
            forward_to = [loki.write.remote.receiver]
          }

          // Send logs to Loki
          loki.write "remote" {
            endpoint {
              url = "{{ alloy_loki_endpoint }}"
            }
          }

  post_tasks:
    - name: Setup shell history file permissions for Alloy
      block:
        - name: Create shell history files if they don't exist
          ansible.builtin.file:
            path: "{{ item }}"
            state: touch
            owner: "{{ 'kali' if 'kali' in item else 'root' }}"
            group: "{{ 'kali' if 'kali' in item else 'root' }}"
            mode: '0644'
            modification_time: preserve
            access_time: preserve
          loop:
            - /home/kali/.zsh_history
            - /home/kali/.bash_history
            - /root/.zsh_history
            - /root/.bash_history
          become: true
          failed_when: false

        - name: Set ACL on /home/kali directory for alloy user
          ansible.posix.acl:
            path: /home/kali
            entity: alloy
            etype: user
            permissions: rx
            state: present
          become: true
          failed_when: false

        - name: Set ACL on shell history files for alloy user
          ansible.posix.acl:
            path: "{{ item }}"
            entity: alloy
            etype: user
            permissions: r
            state: present
          loop:
            - /home/kali/.zsh_history
            - /home/kali/.bash_history
            - /root/.zsh_history
            - /root/.bash_history
          become: true
          failed_when: false

        - name: Restart alloy service to pick up file permissions
          ansible.builtin.systemd:
            name: alloy
            state: restarted
          become: true
          failed_when: false

    - name: Display GOAD attack box provisioning summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "GOAD Attack Box Provisioned Successfully"
          - "=========================================="
          - ""
          - "GOAD Attack Categories Covered:"
          - ""
          - "1. Initial Access & Reconnaissance:"
          - "   - nmap, netexec (with slinky/scuffy coercion)"
          - "   - enum4linux-ng, bloodhound"
          - "   - adidnsdump, rpcclient"
          - ""
          - "2. Credential Discovery:"
          - "   - Password spraying (sprayhound)"
          - "   - Hash cracking (hashcat, john)"
          - "   - Wordlists (rockyou, seclists)"
          - ""
          - "3. Network Poisoning & Relay:"
          - "   - Responder (LLMNR/NBT-NS)"
          - "   - mitm6 (DHCPv6)"
          - "   - ntlmrelayx (via impacket)"
          - "   - krbrelayx (Kerberos relay)"
          - ""
          - "4. Kerberos Attacks:"
          - "   - AS-REP Roasting (GetNPUsers.py)"
          - "   - Kerberoasting (GetUserSPNs.py)"
          - "   - targetedKerberoast"
          - ""
          - "5. ADCS Attacks (ESC1-15):"
          - "   - Certipy-AD"
          - "   - Coercer (for ESC8)"
          - "   - PetitPotam (for ESC8)"
          - ""
          - "6. ACL Abuse:"
          - "   - bloodyAD"
          - "   - dacledit.py (via impacket)"
          - ""
          - "7. Delegation Attacks:"
          - "   - rbcd.py (via impacket)"
          - "   - getST.py (via impacket)"
          - "   - Shadow credentials (pywhisker)"
          - ""
          - "8. MSSQL Exploitation:"
          - "   - mssqlclient.py (via impacket)"
          - "   - PowerUpSQL (PowerShell MSSQL toolkit)"
          - ""
          - "9. Privilege Escalation:"
          - "   - PrintSpoofer, GodPotato"
          - "   - noPac (CVE-2021-42287)"
          - "   - PrintNightmare (CVE-2021-1675)"
          - "   - KrbRelayUp"
          - "   - WinPEAS, LinPEAS"
          - ""
          - "10. Lateral Movement:"
          - "    - evil-winrm"
          - "    - lsassy"
          - "    - xfreerdp (RDP PTH)"
          - "    - impacket (psexec, wmiexec, smbexec)"
          - ""
          - "11. Domain Trust Exploitation:"
          - "    - raiseChild.py (via impacket)"
          - "    - ticketer.py (via impacket)"
          - ""
          - "Tools Location:"
          - "  - Ares workspace: /opt/ares"
          - "  - PrivEsc tools: /opt/privesc"
          - "  - Wordlists: /usr/share/wordlists"
          - ""
          - "=========================================="
          - "Ready to attack GOAD!"
          - "=========================================="
