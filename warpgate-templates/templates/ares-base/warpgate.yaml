---
# yaml-language-server: $schema=https://raw.githubusercontent.com/cowdogmoo/warpgate/main/schema/warpgate-template.json
metadata:
    name: ares-base
    version: 1.0.0
    description: Base Ares framework image with Python, Rust build tools, and core dependencies
    author: Dreadnode <info@dreadnode.io>
    license: MIT
    tags:
        - ares
        - rust
        - base
    requires:
        warpgate: '>=1.0.0'
name: ares-base
version: latest
base:
    image: kalilinux/kali-rolling
    pull: true
    privileged: true
    volumes:
        /sys/fs/cgroup: /sys/fs/cgroup:rw
    run_command:
        - -d
        - -i
        - -t
        - --cgroupns=host
        - '{{ .Image }}'
    environment:
        DEBIAN_FRONTEND: noninteractive
        TZ: UTC
    changes:
        - ENTRYPOINT ${ENTRYPOINT}
        - ENV DEBIAN_FRONTEND=noninteractive
        - ENV TZ=UTC
provisioners:
    - type: shell
      only:
        - docker.arm64
        - docker.amd64
      inline:
        - apt-get update && apt-get install -y --no-install-recommends ca-certificates git procps sudo python3-apt python3.13 python3.13-venv python3.13-dev python3-dev python3-pip build-essential pkg-config libssl-dev libc6-dev libffi-dev curl wget cargo netcat-traditional strace lsof tcpdump net-tools iproute2 telnet vim jq htop tmux acl bind9-dnsutils unzip
        - python3.13 -m pip install --break-system-packages --no-cache-dir uv
        - python3.13 -m pip install --break-system-packages cffi cryptography
        - python3.13 -m pip install --break-system-packages ansible-core
    - type: ansible
      only:
        - docker.arm64
        - docker.amd64
      playbook_path: ${PROVISION_REPO_PATH}/playbooks/ares/base.yml
      galaxy_file: ${PROVISION_REPO_PATH}/requirements.yml
      extra_vars:
        container_build: true
        ansible_shell_executable: /bin/bash
        ansible_python_interpreter: /usr/bin/python3
      ansible_env_vars:
        - ANSIBLE_REMOTE_TMP=/tmp/ansible-tmp-$USER
        - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    - type: shell
      only:
        - docker.arm64
        - docker.amd64
      inline:
        - /tmp/post_ansible_cleanup.sh
    - type: shell
      only:
        - docker.arm64
        - docker.amd64
      inline:
        - echo "Build completed successfully"
      changes:
        - USER root
        - WORKDIR /root
targets:
    - type: container
      platforms:
        - linux/amd64
        - linux/arm64
