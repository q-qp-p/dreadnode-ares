# yaml-language-server: $schema=https://raw.githubusercontent.com/cowdogmoo/warpgate/main/schema/warpgate-template.json
metadata:
  name: ares-rust-cracker-agent-gpu
  version: 1.0.0
  description: Rust-native Ares password cracking agent with CUDA/GPU-accelerated hashcat
  author: Dreadnode <info@dreadnode.io>
  license: MIT
  tags:
    - ares
    - rust
    - password-cracking
    - hashcat
    - john
    - cuda
    - gpu
    - nvidia
  requires:
    warpgate: ">=1.0.0"
name: ares-rust-cracker-agent-gpu
version: latest
base:
  image: ghcr.io/dreadnode/ares-cracker-base-gpu:latest
  pull: true
  privileged: true
  volumes:
    /sys/fs/cgroup: /sys/fs/cgroup:rw
  run_command:
    - -d
    - -i
    - -t
    - --cgroupns=host
    - "{{ .Image }}"
  environment:
    DEBIAN_FRONTEND: noninteractive
    TZ: UTC
  changes:
    - ENTRYPOINT ${ENTRYPOINT}
    - ENV DEBIAN_FRONTEND=noninteractive
    - ENV TZ=UTC
    - ENV NVIDIA_VISIBLE_DEVICES=all
    - ENV NVIDIA_DRIVER_CAPABILITIES=compute,utility
sources:
  - name: ares
    git:
      repository: https://github.com/dreadnode/ares.git
      ref: main
      depth: 1
      auth:
        token: ${GITHUB_TOKEN}
provisioners:
  - type: file
    source: ${sources.ares}
    destination: /tmp/ares-build
  - type: shell
    only:
      - docker.amd64
    inline:
      - rm -f /var/lib/apt/lists/lock /var/cache/apt/archives/lock /var/lib/dpkg/lock*
      - apt-get update
      - apt-get install -y --no-install-recommends ca-certificates curl gcc-14 g++-14 pkg-config libssl-dev cmake
      - apt-get install -y --reinstall libc6-dev linux-libc-dev
      - update-alternatives --install /usr/bin/cc cc /usr/bin/gcc-14 100
      - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
      - export PATH="/root/.cargo/bin:$PATH"
      - ln -sf /usr/bin/gcc /usr/local/bin/x86_64-unknown-linux-gnu-gcc
      - cd /tmp/ares-build && cargo build --release --bin ares
      - cp /tmp/ares-build/target/release/ares /usr/local/bin/ares-worker
      - rm -rf /tmp/ares-build /root/.cargo /root/.rustup /usr/local/bin/x86_64-unknown-linux-gnu-gcc
      - rm -f /var/lib/apt/lists/lock /var/cache/apt/archives/lock /var/lib/dpkg/lock*
      - apt-get purge -y gcc-14 g++-14 pkg-config libssl-dev cmake || true
      - apt-get autoremove -y || true
      - apt-get clean || true
      - rm -rf /var/lib/apt/lists/*
  - type: shell
    only:
      - docker.amd64
    inline:
      - echo "Build completed successfully"
    changes:
      - USER root
      - WORKDIR /root
targets:
  - type: container
    platforms:
      - linux/amd64
