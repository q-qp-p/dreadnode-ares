# yaml-language-server: $schema=https://raw.githubusercontent.com/cowdogmoo/warpgate/main/schema/warpgate-template.json
metadata:
  name: ares-rust-blue-threat-hunter-agent
  version: 1.0.0
  description: Rust-native Ares blue team threat hunter agent for proactive threat detection and investigation
  author: Dreadnode <info@dreadnode.io>
  license: MIT
  tags:
    - ares
    - rust
    - blue-team
    - defensive
    - threat-hunting
  requires:
    warpgate: ">=1.0.0"
name: ares-rust-blue-threat-hunter-agent
version: latest
base:
  image: debian:trixie-slim
  pull: true
  run_command:
    - -d
    - -i
    - -t
  environment:
    DEBIAN_FRONTEND: noninteractive
    TZ: UTC
  changes:
    - ENTRYPOINT ["ares-worker"]
    - ENV DEBIAN_FRONTEND=noninteractive
    - ENV TZ=UTC
sources:
  - name: ares
    git:
      repository: https://github.com/dreadnode/ares.git
      ref: main
      depth: 1
      auth:
        token: ${GITHUB_TOKEN}
provisioners:
  - type: shell
    only:
      - docker.amd64
    inline:
      - apt-get update
      - apt-get install -y --no-install-recommends ca-certificates curl
      - curl -fsSL https://github.com/grafana/mcp-grafana/releases/latest/download/mcp-grafana_Linux_x86_64.tar.gz -o /tmp/mcp-grafana.tar.gz
      - tar -xzf /tmp/mcp-grafana.tar.gz -C /usr/local/bin mcp-grafana
      - chmod +x /usr/local/bin/mcp-grafana
      - rm -f /tmp/mcp-grafana.tar.gz
      - apt-get clean
      - rm -rf /var/lib/apt/lists/*
  - type: shell
    only:
      - docker.arm64
    inline:
      - apt-get update
      - apt-get install -y --no-install-recommends ca-certificates curl
      - curl -fsSL https://github.com/grafana/mcp-grafana/releases/latest/download/mcp-grafana_Linux_arm64.tar.gz -o /tmp/mcp-grafana.tar.gz
      - tar -xzf /tmp/mcp-grafana.tar.gz -C /usr/local/bin mcp-grafana
      - chmod +x /usr/local/bin/mcp-grafana
      - rm -f /tmp/mcp-grafana.tar.gz
      - apt-get clean
      - rm -rf /var/lib/apt/lists/*
  - type: file
    source: ${sources.ares}
    destination: /tmp/ares-build
  - type: shell
    only:
      - docker.arm64
      - docker.amd64
    inline:
      - rm -f /var/lib/apt/lists/lock /var/cache/apt/archives/lock /var/lib/dpkg/lock*
      - apt-get update
      - apt-get install -y --no-install-recommends ca-certificates curl build-essential pkg-config libssl-dev
      - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
      - export PATH="/root/.cargo/bin:$PATH"
      - ln -sf /usr/bin/gcc /usr/local/bin/x86_64-unknown-linux-gnu-gcc
      - ln -sf /usr/bin/gcc /usr/local/bin/aarch64-unknown-linux-gnu-gcc
      - cd /tmp/ares-build && cargo build --release --bin ares
      - cp /tmp/ares-build/target/release/ares /usr/local/bin/ares-worker
  - type: shell
    only:
      - docker.arm64
      - docker.amd64
    inline:
      - rm -rf /tmp/ares-build
      - rm -rf /root/.cargo /root/.rustup /usr/local/bin/x86_64-unknown-linux-gnu-gcc /usr/local/bin/aarch64-unknown-linux-gnu-gcc
      - rm -f /var/lib/apt/lists/lock /var/cache/apt/archives/lock /var/lib/dpkg/lock*
      - apt-get purge -y build-essential pkg-config libssl-dev || true
      - apt-get autoremove -y || true
      - apt-get clean || true
      - rm -rf /var/lib/apt/lists/*
  - type: shell
    only:
      - docker.arm64
      - docker.amd64
    inline:
      - echo "Build completed successfully"
    changes:
      - USER root
      - WORKDIR /root
targets:
  - type: container
    platforms:
      - linux/amd64
      - linux/arm64
