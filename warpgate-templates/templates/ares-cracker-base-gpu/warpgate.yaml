# yaml-language-server: $schema=https://raw.githubusercontent.com/cowdogmoo/warpgate/main/schema/warpgate-template.json
metadata:
  name: ares-cracker-base-gpu
  version: 1.0.0
  description: Base image with CUDA/OpenCL GPU-accelerated hashcat (pre-compiled)
  author: Dreadnode <info@dreadnode.io>
  license: MIT
  tags:
    - ares
    - password-cracking
    - hashcat
    - john
    - cuda
    - gpu
    - nvidia
    - base
  requires:
    warpgate: ">=1.0.0"
name: ares-cracker-base-gpu
version: latest
base:
  image: nvidia/cuda:12.6.0-runtime-ubuntu24.04
  pull: true
  privileged: true
  volumes:
    /sys/fs/cgroup: /sys/fs/cgroup:rw
  run_command:
    - -d
    - -i
    - -t
    - --cgroupns=host
    - "{{ .Image }}"
  environment:
    DEBIAN_FRONTEND: noninteractive
    TZ: UTC
  changes:
    - ENV DEBIAN_FRONTEND=noninteractive
    - ENV TZ=UTC
    - ENV NVIDIA_VISIBLE_DEVICES=all
    - ENV NVIDIA_DRIVER_CAPABILITIES=compute,utility
provisioners:
  - type: shell
    only:
      - docker.amd64
    inline:
      - apt-get update && apt-get install -y --no-install-recommends python3 python3-pip ansible-core git
  - type: ansible
    only:
      - docker.amd64
    playbook_path: ${PROVISION_REPO_PATH}/playbooks/ares/cracker.yml
    galaxy_file: ${PROVISION_REPO_PATH}/requirements.yml
    extra_vars:
      container_build: true
      build_cleanup_install_path: /usr/local/bin
      build_cleanup_user_home: /root
      build_cleanup_username: root
      ansible_shell_executable: /bin/bash
      cracking_tools_gpu_support: true
      cracking_tools_hashcat_from_source: true
      cracking_tools_nvidia_opencl_icd: true
    ansible_env_vars:
      - ANSIBLE_REMOTE_TMP=/tmp/ansible-tmp-$USER
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  - type: shell
    only:
      - docker.amd64
    inline:
      - /tmp/post_ansible_cleanup.sh
      - echo "Base GPU image with hashcat compiled successfully"
    changes:
      - USER root
      - WORKDIR /root
targets:
  - type: container
    platforms:
      - linux/amd64
