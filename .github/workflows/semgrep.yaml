---
name: 🚨 Semgrep Analysis
on:
  merge_group:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *" # Run daily at midnight UTC

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  checks: write
  contents: read
  pull-requests: write # Allows merge queue updates
  security-events: write # Required for GitHub Security tab

jobs:
  semgrep:
    name: 🚨 Semgrep Analysis
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep@sha256:a3d49dc967b8534a6a76628e50c51cbfe33eb7195dc2feab1fdc0f100852c8ef

    # Skip any PR created by dependabot to avoid permission issues:
    if: (github.actor != 'dependabot[bot]')

    steps:
      - name: Set up git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git Safe Directory
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Semgrep Analysis
        env:
          SEMGREP_RULES: >-
            p/rust
            p/python
            p/github-actions
            p/security-audit
            p/secrets
            p/owasp-top-ten
            p/supply-chain
          SEMGREP_TIMEOUT: 300 # 5-minute timeout per rule
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          semgrep ci \
            --config="${SEMGREP_RULES}" \
            --timeout="${SEMGREP_TIMEOUT}" \
            --sarif --output=semgrep-results.sarif

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@fca7ace96b7d713c7035871441bd52efbe39e27e # v3.28.19
        with:
          sarif_file: semgrep-results.sarif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
