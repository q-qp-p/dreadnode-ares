---
name: Molecule Test
on:
  merge_group:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'ansible/**'
      - '.github/workflows/molecule.yaml'
      - '.hooks/requirements.txt'
  push:
    branches:
      - main
    paths:
      - 'ansible/**'
      - '.github/workflows/molecule.yaml'
      - '.hooks/requirements.txt'
  schedule:
    # Runs every Sunday at 4 AM (see https://crontab.guru)
    - cron: "0 4 * * 0"
  workflow_dispatch:
    inputs:
      ROLE:
        description: 'Role to test'
        required: false
        default: ''
        type: string
      SCENARIO:
        description: 'Molecule scenario to run (default: default)'
        required: false
        default: 'default'
        type: string

concurrency:
  # Only cancel in-progress runs for PRs, not for main branch or scheduled runs
  cancel-in-progress: ${{ github.event_name == 'pull_request' && ! contains(github.event.pull_request.labels.*.name, 'renovate') }}
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && ! contains(github.event.pull_request.labels.*.name, 'renovate') && github.event.pull_request.number || github.ref }}

env:
  ANSIBLE_FORCE_COLOR: "1"
  COLLECTION_NAMESPACE: dreadnode
  COLLECTION_NAME: nimbus_range
  COLLECTION_PATH: ansible_collections/dreadnode/nimbus_range
  REQUIREMENTS_FILE: .hooks/requirements.txt
  PY_COLORS: "1"
  PYTHON_VERSION: "3.13.7"
  ROLE: ${{ github.event.inputs.ROLE }}
  SCENARIO: ${{ github.event.inputs.SCENARIO || 'default' }}
  ANSIBLE_COLLECTIONS_PATH: ~/.ansible/collections

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      roles: ${{ steps.filter.outputs.roles }}
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
      max_parallel: ${{ steps.generate-matrix.outputs.max_parallel }}
      test_all: ${{ steps.check-event.outputs.test_all }}
    steps:
      - name: Set up git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check event type
        id: check-event
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ROLE: ${{ env.ROLE }}
        run: |
          # Test all on: push to main, schedule, workflow_dispatch without specific inputs, merge_group
          if [[ "${EVENT_NAME}" == "push" ]] || \
             [[ "${EVENT_NAME}" == "schedule" ]] || \
             [[ "${EVENT_NAME}" == "merge_group" ]] || \
             [[ "${EVENT_NAME}" == "workflow_dispatch" && -z "${INPUT_ROLE}" ]]; then
            echo "test_all=true" >> "$GITHUB_OUTPUT"
          else
            echo "test_all=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect changed files
        id: filter
        if: steps.check-event.outputs.test_all == 'false'
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            BASE="${PR_BASE_SHA}"
            HEAD="${PR_HEAD_SHA}"
          else
            BASE="origin/main"
            HEAD="HEAD"
          fi

          # Get changed files under ansible/
          CHANGED_FILES=$(git diff --name-only "$BASE"..."$HEAD" -- ansible/)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Extract changed roles (only those with molecule tests)
          ROLES=$(echo "$CHANGED_FILES" | grep '^ansible/roles/' | cut -d'/' -f3 | sort -u | tr '\n' ' ')
          echo "roles=$ROLES" >> "$GITHUB_OUTPUT"
          echo "Changed roles: $ROLES"

      - name: Generate test matrix
        id: generate-matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          TEST_ALL: ${{ steps.check-event.outputs.test_all }}
          CHANGED_ROLES: ${{ steps.filter.outputs.roles }}
        run: |
          # Define roles with molecule tests
          ROLES_WITH_MOLECULE=(
            "acl_tools"
            "base"
            "coercion_tools"
            "cracking_tools"
            "credential_access_tools"
            "lateral_movement_tools"
            "mythic"
            "privesc_tools"
            "recon_tools"
          )

          # Define additional scenarios (role:scenario format)
          # These only run on schedule/workflow_dispatch (too slow for PR CI)
          declare -A ADDITIONAL_SCENARIOS=()
          if [[ "${EVENT_NAME}" == "schedule" ]] || \
             [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            ADDITIONAL_SCENARIOS=(
              ["cracking_tools"]="source-build"
            )
          fi

          if [[ "${TEST_ALL}" == "true" ]]; then
            # Test all roles that have molecule tests
            MATRIX_JSON='['
            FIRST=true

            for role in "${ROLES_WITH_MOLECULE[@]}"; do
              if [[ "$FIRST" == "true" ]]; then
                FIRST=false
              else
                MATRIX_JSON+=","
              fi
              MATRIX_JSON+="{\"name\":\"Role Test - ${role}\",\"path\":\"roles/${role}\",\"scenario\":\"default\"}"

              if [[ -n "${ADDITIONAL_SCENARIOS[$role]}" ]]; then
                for scenario in ${ADDITIONAL_SCENARIOS[$role]}; do
                  MATRIX_JSON+=",{\"name\":\"Role Test - ${role} (${scenario})\",\"path\":\"roles/${role}\",\"scenario\":\"${scenario}\"}"
                done
              fi
            done

            MATRIX_JSON+=']'
          else
            # Test only changed roles that have molecule tests
            ROLES="${CHANGED_ROLES}"
            MATRIX_JSON="["
            FIRST=true

            if [[ -n "$ROLES" ]]; then
              for role in $ROLES; do
                if [[ " ${ROLES_WITH_MOLECULE[*]} " == *" ${role} "* ]]; then
                  if [[ "$FIRST" == "true" ]]; then
                    FIRST=false
                  else
                    MATRIX_JSON+=","
                  fi
                  MATRIX_JSON+="{\"name\":\"Role Test - ${role}\",\"path\":\"roles/${role}\",\"scenario\":\"default\"}"

                  if [[ -n "${ADDITIONAL_SCENARIOS[$role]}" ]]; then
                    for scenario in ${ADDITIONAL_SCENARIOS[$role]}; do
                      MATRIX_JSON+=",{\"name\":\"Role Test - ${role} (${scenario})\",\"path\":\"roles/${role}\",\"scenario\":\"${scenario}\"}"
                    done
                  fi
                fi
              done
            fi

            MATRIX_JSON+=']'
          fi

          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
          echo "Matrix to test: $MATRIX_JSON"

          # Calculate dynamic max-parallel based on matrix size
          MATRIX_COUNT=$(echo "$MATRIX_JSON" | jq '. | length')

          # Handle empty matrix
          if [[ $MATRIX_COUNT -eq 0 ]]; then
            echo "max_parallel=1" >> "$GITHUB_OUTPUT"
            echo "No tests to run (empty matrix)"
            exit 0
          fi

          MAX_PARALLEL=$(( (MATRIX_COUNT * 60) / 100 ))
          [[ $MAX_PARALLEL -lt 4 ]] && MAX_PARALLEL=4
          [[ $MAX_PARALLEL -gt 12 ]] && MAX_PARALLEL=12

          echo "max_parallel=$MAX_PARALLEL" >> "$GITHUB_OUTPUT"
          echo "Calculated max-parallel: $MAX_PARALLEL (based on $MATRIX_COUNT tests)"

  validate-inputs:
    runs-on: ubuntu-latest
    steps:
      - name: Set up git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate inputs
        env:
          INPUT_ROLE: ${{ env.ROLE }}
        run: |
          ROLES_WITH_MOLECULE=(
            "acl_tools"
            "base"
            "coercion_tools"
            "cracking_tools"
            "credential_access_tools"
            "lateral_movement_tools"
            "mythic"
            "privesc_tools"
            "recon_tools"
          )

          if [[ -n "${INPUT_ROLE}" ]]; then
            if [[ ! -d "ansible/roles/${INPUT_ROLE}" ]]; then
              echo "::error::Role '${INPUT_ROLE}' not found in ansible/roles/"
              exit 1
            fi
            if [[ ! " ${ROLES_WITH_MOLECULE[*]} " == *" ${INPUT_ROLE} "* ]]; then
              echo "::error::Role '${INPUT_ROLE}' does not have molecule tests"
              exit 1
            fi
          fi

  role_test:
    needs: validate-inputs
    if: ${{ github.event.inputs.ROLE != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - name: ${{ format('Role Test - {0}', github.event.inputs.ROLE) }}
            path: ${{ format('roles/{0}', github.event.inputs.ROLE) }}

    steps:
      - name: Delete huge unnecessary tools folder
        shell: bash
        run: |
          echo "Initial disk space:"
          df -h
          rm -rf /opt/hostedtoolcache
          echo "Disk space after cleanup:"
          df -h

      - name: Checkout git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ${{ env.COLLECTION_PATH }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: '${{ env.COLLECTION_PATH }}/${{ env.REQUIREMENTS_FILE }}'

      - name: Cache Ansible collections
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.ansible/collections
          key: ${{ runner.os }}-ansible-${{ github.ref }}-${{ hashFiles('**/requirements.yml') }}

      - name: Install dependencies
        shell: bash
        env:
          COLL_PATH: ${{ env.COLLECTION_PATH }}
          REQS_FILE: ${{ env.REQUIREMENTS_FILE }}
        run: |
          python3 -m pip install -r "${COLL_PATH}/${REQS_FILE}"

      - name: Install galaxy dependencies
        working-directory: ${{ env.COLLECTION_PATH }}/ansible
        shell: bash
        run: |
          ansible-galaxy collection install -r requirements.yml
          ansible-galaxy install -r requirements.yml

      - name: Build and install collection locally
        working-directory: ${{ env.COLLECTION_PATH }}/ansible
        shell: bash
        run: |
          ansible-galaxy collection build --force
          ansible-galaxy collection install dreadnode-nimbus_range-*.tar.gz -p ~/.ansible/collections --force --pre

      - name: Run molecule test
        working-directory: ${{ env.COLLECTION_PATH }}/ansible/${{ matrix.path }}
        shell: bash
        env:
          ANSIBLE_CONFIG: ${{ env.COLLECTION_PATH }}/ansible/ansible.cfg
          ANSIBLE_ROLES_PATH: ${{ env.COLLECTION_PATH }}/ansible/roles
          MOLECULE_NO_LOG: "false"
          MOLECULE_SCENARIO: ${{ env.SCENARIO }}
        run: |
          set -e
          molecule --version
          molecule list

          if ! MOLECULE_DEBUG=1 molecule test -s "${MOLECULE_SCENARIO}"; then
            echo "Molecule test failed. Collecting debug information..."

            echo "Docker containers:"
            docker ps -a

            echo "=== Docker Container Logs ==="
            while read -r container; do
              echo "=== Logs from container ${container} ==="
              docker logs "${container}" 2>&1
              echo "=== End logs for container ${container} ==="
            done < <(docker ps -q)

            echo "=== Molecule Logs ==="
            while IFS= read -r -d '' log; do
              echo "Contents of ${log}:"
              cat "${log}"
              echo "=== End of ${log} ==="
            done < <(find . -name '*.log' -print0)

            exit 1
          fi

  full_test:
    needs: [validate-inputs, detect-changes]
    if: ${{ github.event.inputs.ROLE == '' && fromJson(needs.detect-changes.outputs.max_parallel) > 0 }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(needs.detect-changes.outputs.max_parallel) }}
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Delete huge unnecessary tools folder
        shell: bash
        run: |
          echo "Initial disk space:"
          df -h
          rm -rf /opt/hostedtoolcache
          echo "Disk space after cleanup:"
          df -h

      - name: Checkout git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ${{ env.COLLECTION_PATH }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: '${{ env.COLLECTION_PATH }}/${{ env.REQUIREMENTS_FILE }}'

      - name: Cache Ansible collections
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.ansible/collections
          key: ${{ runner.os }}-ansible-${{ github.ref }}-${{ hashFiles('**/requirements.yml') }}

      - name: Install dependencies
        shell: bash
        env:
          COLL_PATH: ${{ env.COLLECTION_PATH }}
          REQS_FILE: ${{ env.REQUIREMENTS_FILE }}
        run: |
          python3 -m pip install -r "${COLL_PATH}/${REQS_FILE}"

      - name: Install galaxy dependencies
        working-directory: ${{ env.COLLECTION_PATH }}/ansible
        shell: bash
        run: |
          ansible-galaxy collection install -r requirements.yml
          ansible-galaxy install -r requirements.yml

      - name: Build and install collection locally
        working-directory: ${{ env.COLLECTION_PATH }}/ansible
        shell: bash
        run: |
          ansible-galaxy collection build --force
          ansible-galaxy collection install dreadnode-nimbus_range-*.tar.gz -p ~/.ansible/collections --force --pre

      - name: Run molecule test
        working-directory: ${{ env.COLLECTION_PATH }}/ansible/${{ matrix.path }}
        shell: bash
        env:
          ANSIBLE_CONFIG: ${{ env.COLLECTION_PATH }}/ansible/ansible.cfg
          MOLECULE_SCENARIO: ${{ matrix.scenario }}
        run: |
          set -e
          molecule --version
          molecule list

          SCENARIO="${MOLECULE_SCENARIO:-default}"

          if ! MOLECULE_DEBUG=1 molecule test -s "$SCENARIO"; then
            echo "Molecule test failed. Collecting debug information..."

            echo "Docker containers:"
            docker ps -a

            echo "=== Docker Container Logs ==="
            while read -r container; do
              echo "=== Logs from container ${container} ==="
              docker logs "${container}" 2>&1
              echo "=== End logs for container ${container} ==="
            done < <(docker ps -q)

            echo "=== Molecule Logs ==="
            while IFS= read -r -d '' log; do
              echo "Contents of ${log}:"
              cat "${log}"
              echo "=== End of ${log} ==="
            done < <(find . -name '*.log' -print0)

            exit 1
          fi
