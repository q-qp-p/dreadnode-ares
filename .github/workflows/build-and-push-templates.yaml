          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          repositories: |
            ares-warpgate-templates
            ansible-collection-nimbus_range
            ares

      - name: Checkout git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}

      - name: Setup XDG directories
        run: |
          # Set XDG directories and ensure they exist
          USER_ID="$(id -u)"
          export XDG_RUNTIME_DIR="/run/user/$USER_ID"
          export XDG_CONFIG_HOME="$HOME/.config"
          export XDG_DATA_HOME="$HOME/.local/share"

          # Create directories if they don't exist
          mkdir -p "$XDG_CONFIG_HOME"
          mkdir -p "$XDG_DATA_HOME"
          mkdir -p "$HOME/.local/bin"

          {
            echo "XDG_RUNTIME_DIR=/run/user/$USER_ID"
            echo "XDG_CONFIG_HOME=$HOME/.config"
            echo "XDG_DATA_HOME=$HOME/.local/share"
          } >> "$GITHUB_ENV"

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ansible
        if: matrix.needs_ansible == true
        run: python3 -m pip install ansible

      - name: Clone ansible-collection repository
        if: matrix.needs_ansible == true
        run: |
          # Use GitHub tarball API for deterministic content without metadata variations
          # This ensures BuildKit cache hits by avoiding UID/GID and timestamp differences
          # See: https://github.com/moby/moby/issues/32816
          if [ "${{ matrix.provision_repo }}" == "ansible-collection-nimbus_range" ]; then
            mkdir -p "$HOME/ansible-collection-nimbus_range"
            # For private repos, use token-authenticated API
            curl -sL -H "Authorization: token ${{ steps.app-token.outputs.token }}" \
              "https://api.github.com/repos/dreadnode/ansible-collection-nimbus_range/tarball/HEAD" | \
              tar -xzf - --strip-components=1 -C "$HOME/ansible-collection-nimbus_range"
          fi

          # Normalize permissions to ensure deterministic cache keys across runners
          # All files get 644, all dirs get 755
          if [ "${{ matrix.provision_repo }}" == "ansible-collection-nimbus_range" ]; then
            find "$HOME/ansible-collection-nimbus_range" -type f -exec chmod 644 {} \;
            find "$HOME/ansible-collection-nimbus_range" -type d -exec chmod 755 {} \;
          fi

      - name: Install Ansible Collection
        if: matrix.needs_ansible == true
        run: |
          # Create the ansible collections directory
          mkdir -p "$HOME/.ansible/collections"

          # Build and install the required collection
          if [ "${{ matrix.provision_repo }}" == "ansible-collection-nimbus_range" ]; then
            cd "$HOME/ansible-collection-nimbus_range"
            ansible-galaxy collection build --force
            ansible-galaxy collection install \
              dreadnode-nimbus_range-*.tar.gz \
              -p "$HOME/.ansible/collections" \
              --force \
              --pre
          fi

      - name: Login to GitHub Container Registry (Docker)
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.WG_IMAGE_BUILDER_PAT }}

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf /usr/local/lib/android
