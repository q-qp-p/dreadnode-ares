          # See: https://github.com/docker/buildx/issues/2208
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1

      - name: Upload digest
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: base-digests-${{ matrix.name }}-tag-${{ matrix.architecture.arch }}
          path: ${{ github.workspace }}/digest-${{ matrix.name }}-${{ matrix.architecture.arch }}.txt
          retention-days: 1

  merge-base-manifests:
    name: "[Base] Create manifest for ${{ matrix.name }}"
    needs: [discover-templates, build-base-images]
    if: github.event_name != 'pull_request' && needs.discover-templates.outputs.has_base_templates == 'true'
