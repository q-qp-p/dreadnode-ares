          USER_ID="$(id -u)"
          mkdir -p "$HOME/.config" "$HOME/.local/share" "$HOME/.local/bin"
          {
            echo "XDG_RUNTIME_DIR=/run/user/$USER_ID"
            echo "XDG_CONFIG_HOME=$HOME/.config"
            echo "XDG_DATA_HOME=$HOME/.local/share"
          } >> "$GITHUB_ENV"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache Warpgate binary
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: warpgate-cache
        with:
          path: ~/.local/bin/warpgate
          key: warpgate-${{ env.WARPGATE_VERSION }}-${{ runner.arch }}

      - name: Install Warpgate from release
        if: steps.warpgate-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ env.WARPGATE_VERSION }}"
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64) ARCH="amd64"; ALT_ARCH="x86_64" ;;
            aarch64|arm64) ARCH="arm64"; ALT_ARCH="aarch64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          TMP_DIR="$(mktemp -d)"
          gh release download "$VERSION" -R CowDogMoo/warpgate -D "$TMP_DIR" \
            -p "*linux*${ARCH}*" -p "*Linux*${ARCH}*" -p "*linux*${ALT_ARCH}*" -p "*Linux*${ALT_ARCH}*"
          ASSET_PATH="$(find "$TMP_DIR" -maxdepth 1 -type f -print -quit)"
          ASSET="$(basename "$ASSET_PATH")"
          case "$ASSET" in
            *.tar.gz) tar -xzf "$TMP_DIR/$ASSET" -C "$TMP_DIR" ;;
            *.zip) unzip -q "$TMP_DIR/$ASSET" -d "$TMP_DIR" ;;
            *) echo "Unknown archive: $ASSET"; exit 1 ;;
          esac
          WARPGATE_BIN="$(find "$TMP_DIR" -maxdepth 3 -type f -name warpgate | head -n 1)"
          [ -z "$WARPGATE_BIN" ] && echo "warpgate binary not found" && exit 1
          install -m 0755 "$WARPGATE_BIN" "$HOME/.local/bin/warpgate"
          rm -rf "$TMP_DIR"

      - name: Verify Warpgate installation
        run: warpgate version

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: gpu-dependent-digests-${{ matrix.name }}-tag-*
          path: .
          merge-multiple: true

      - name: List downloaded digest files
        run: |
          echo "Files in current directory:"
          ls -la
          ls -la digest-*.txt || echo "No digest files found"

      - name: Verify digest files
        run: |
          for file in digest-${{ matrix.name }}-*.txt; do
            [ ! -f "$file" ] && echo "ERROR: Expected digest file not found: $file" && exit 1
            grep -qE '^sha256:[a-f0-9]{64}$' "$file" || (echo "ERROR: Invalid digest in $file" && exit 1)
            echo "Verified: $file" && cat "$file"
          done

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.WG_IMAGE_BUILDER_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          driver: docker-container

      - name: Ensure required digests exist
        run: |
          SUPPORTED_PLATFORMS="${{ join(matrix.supported_platforms, ',') }}"
          IFS=',' read -ra ARCHS <<< "$SUPPORTED_PLATFORMS"
          for arch in "${ARCHS[@]}"; do
            file="digest-${{ matrix.name }}-${arch}.txt"
            if [ ! -f "$file" ]; then
              echo "ERROR: Missing digest file: $file"
              exit 1
            fi
          done

      - name: Create multi-arch manifest
        run: |
          REQUIRED_ARCHS="${{ join(matrix.supported_platforms, ',') }}"
          warpgate manifests create \
            --name ${{ matrix.name }} \
            --registry ghcr.io \
            --namespace ${{ matrix.namespace }} \
            --tag latest \
            --digest-dir . \
            --require-arch "$REQUIRED_ARCHS"
        env:
          GITHUB_TOKEN: ${{ secrets.WG_IMAGE_BUILDER_PAT }}

      - name: Verify multi-arch manifest
        run: |
          docker buildx imagetools inspect ghcr.io/${{ matrix.namespace }}/${{ matrix.name }}:latest

  build-summary:
    name: Build Summary
    runs-on: ubuntu24.04-amd64-8-core
    needs: [discover-templates, build-base-images, merge-base-manifests, build-dependent-images, merge-dependent-manifests, build-gpu-base-images, merge-gpu-base-manifests, build-gpu-dependent-images, merge-gpu-dependent-manifests]
    if: always()
    steps:
      - name: Check build results
        run: |
          echo "=== Build Results Summary ==="
          echo ""
          echo "Main Chain - Base Images:"
          echo "  build-base-images: ${{ needs.build-base-images.result }}"
          echo "  merge-base-manifests: ${{ needs.merge-base-manifests.result }}"
          echo ""
          echo "Main Chain - Dependent Images:"
          echo "  build-dependent-images: ${{ needs.build-dependent-images.result }}"
          echo "  merge-dependent-manifests: ${{ needs.merge-dependent-manifests.result }}"
          echo ""
          echo "GPU Chain - Base Images:"
          echo "  build-gpu-base-images: ${{ needs.build-gpu-base-images.result }}"
          echo "  merge-gpu-base-manifests: ${{ needs.merge-gpu-base-manifests.result }}"
          echo ""
          echo "GPU Chain - Dependent Images:"
          echo "  build-gpu-dependent-images: ${{ needs.build-gpu-dependent-images.result }}"
          echo "  merge-gpu-dependent-manifests: ${{ needs.merge-gpu-dependent-manifests.result }}"
          echo ""

          # Check main chain base image builds
          if [ "${{ needs.build-base-images.result }}" != "success" ] && [ "${{ needs.build-base-images.result }}" != "skipped" ]; then
            echo "::error::One or more base image builds failed"
            exit 1
          fi

          if [ "${{ needs.merge-base-manifests.result }}" != "success" ] && [ "${{ needs.merge-base-manifests.result }}" != "skipped" ]; then
            echo "::error::One or more base manifest merges failed"
            exit 1
          fi

          # Check main chain dependent image builds
          if [ "${{ needs.build-dependent-images.result }}" != "success" ] && [ "${{ needs.build-dependent-images.result }}" != "skipped" ]; then
            echo "::error::One or more dependent image builds failed"
            exit 1
          fi

          if [ "${{ needs.merge-dependent-manifests.result }}" != "success" ] && [ "${{ needs.merge-dependent-manifests.result }}" != "skipped" ]; then
            echo "::error::One or more dependent manifest merges failed"
            exit 1
          fi

          # Check GPU chain base image builds
          if [ "${{ needs.build-gpu-base-images.result }}" != "success" ] && [ "${{ needs.build-gpu-base-images.result }}" != "skipped" ]; then
            echo "::error::One or more GPU base image builds failed"
            exit 1
          fi

          if [ "${{ needs.merge-gpu-base-manifests.result }}" != "success" ] && [ "${{ needs.merge-gpu-base-manifests.result }}" != "skipped" ]; then
            echo "::error::One or more GPU base manifest merges failed"
            exit 1
          fi

          # Check GPU chain dependent image builds
          if [ "${{ needs.build-gpu-dependent-images.result }}" != "success" ] && [ "${{ needs.build-gpu-dependent-images.result }}" != "skipped" ]; then
            echo "::error::One or more GPU dependent image builds failed"
            exit 1
          fi

          if [ "${{ needs.merge-gpu-dependent-manifests.result }}" != "success" ] && [ "${{ needs.merge-gpu-dependent-manifests.result }}" != "skipped" ]; then
            echo "::error::One or more GPU dependent manifest merges failed"
            exit 1
          fi

          # Summary
          MAIN_SKIPPED="${{ needs.build-base-images.result == 'skipped' && needs.build-dependent-images.result == 'skipped' }}"
          GPU_SKIPPED="${{ needs.build-gpu-base-images.result == 'skipped' && needs.build-gpu-dependent-images.result == 'skipped' }}"
          if [ "$MAIN_SKIPPED" == "true" ] && [ "$GPU_SKIPPED" == "true" ]; then
            echo "All builds were skipped (likely a PR)"
          else
            echo "All image builds and manifest merges completed successfully"
          fi
