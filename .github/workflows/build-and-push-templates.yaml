          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          VERSION="${{ env.WARPGATE_VERSION }}"
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64)
              ARCH="amd64"
              ALT_ARCH="x86_64"
              ;;
            aarch64|arm64)
              ARCH="arm64"
              ALT_ARCH="aarch64"
              ;;
            *)
              echo "Unsupported arch: $ARCH"
              exit 1
              ;;
          esac

          TMP_DIR="$(mktemp -d)"
          gh release download "$VERSION" \
            -R CowDogMoo/warpgate \
            -D "$TMP_DIR" \
            -p "*linux*${ARCH}*" \
            -p "*Linux*${ARCH}*" \
            -p "*linux*${ALT_ARCH}*" \
            -p "*Linux*${ALT_ARCH}*"

          ASSET_PATH="$(find "$TMP_DIR" -maxdepth 1 -type f -print -quit)"
          ASSET="$(basename "$ASSET_PATH")"
          case "$ASSET" in
            *.tar.gz)
              tar -xzf "$TMP_DIR/$ASSET" -C "$TMP_DIR"
              ;;
            *.zip)
              unzip -q "$TMP_DIR/$ASSET" -d "$TMP_DIR"
              ;;
            *)
              echo "Unknown archive: $ASSET"
              exit 1
              ;;
          esac

          WARPGATE_BIN="$(find "$TMP_DIR" -maxdepth 3 -type f -name warpgate | head -n 1)"
          if [ -z "$WARPGATE_BIN" ]; then
            echo "warpgate binary not found in release asset"
            exit 1
          fi

          install -m 0755 "$WARPGATE_BIN" "$HOME/.local/bin/warpgate"
          rm -rf "$TMP_DIR"

      - name: Verify Warpgate installation
        run: warpgate version

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: base-digests-${{ matrix.name }}-tag-*
          path: .
          merge-multiple: true

      - name: List downloaded digest files
        run: |
          echo "Current directory: $PWD"
          echo "Files in current directory:"
          ls -la
          echo ""
          echo "Digest files:"
          ls -la digest-*.txt || echo "No digest files found"

      - name: Verify digest files
        run: |
          # Verify digest files for this template exist
          echo "Verifying digest files for template: ${{ matrix.name }}"

          for file in digest-${{ matrix.name }}-*.txt; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Expected digest file not found: $file"
              ls -la
              exit 1
            fi

            # Verify digest format (sha256:hex)
            if ! grep -qE '^sha256:[a-f0-9]{64}$' "$file"; then
              echo "ERROR: Invalid digest format in $file:"
              cat "$file"
              exit 1
            fi

            echo "Verified digest file: $file"
            cat "$file"
          done

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
